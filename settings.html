<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png" id="favicon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings – EFM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f4f8;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .content {
      max-width: 560px;
      width: 100%;
      padding: 48px 24px 64px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      margin-bottom: 28px;
      background: #0f0f13;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      padding: 9px 16px;
      transition: background 0.15s;
    }
    .back-btn:hover { background: #2a2a35; }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #0f0f13;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h1 svg { opacity: 0.7; }
    .subtitle {
      font-size: 0.92rem;
      color: #888;
      margin-bottom: 32px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }
    .card-title {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #aaa;
      margin-bottom: 18px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .row:last-child { margin-bottom: 0; }
    .row-label {
      font-size: 0.92rem;
      font-weight: 600;
      color: #333;
      min-width: 90px;
    }
    .row-value {
      font-size: 0.92rem;
      color: #555;
      flex: 1;
    }
    .color-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid rgba(0,0,0,0.1);
    }
    .code-badge {
      font-family: monospace;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      background: #f0f4f8;
      padding: 6px 14px;
      border-radius: 8px;
      color: #0f0f13;
    }
    .copy-btn {
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 14px;
      background: #0f0f13;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .copy-btn:hover { background: #2a2a35; }
    .danger-btn {
      width: 100%;
      padding: 14px;
      background: #fff;
      color: #c0392b;
      border: 1.5px solid #e8b4b0;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      transition: background 0.15s, border-color 0.15s;
    }
    .danger-btn:hover { background: #fdf0ef; border-color: #c0392b; }
    .logout-btn {
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 14px;
      background: #fff;
      color: #555;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      flex-shrink: 0;
      font-family: system-ui, sans-serif;
      transition: background 0.15s, border-color 0.15s;
    }
    .logout-btn:hover { background: #f5f5f5; border-color: #bbb; }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #0f0f13;
      color: #fff;
      padding: 10px 22px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* Speech bubbles */
    .bubble {
      position: absolute;
      background: #fff;
      border: 2px solid #e53e3e;
      border-radius: 12px;
      padding: 6px 13px;
      font-size: 0.82rem;
      font-weight: 800;
      color: #e53e3e;
      white-space: nowrap;
      box-shadow: 0 3px 12px rgba(229,62,62,0.18);
      pointer-events: none;
      animation: bubblePop 0.25s cubic-bezier(.34,1.56,.64,1) both;
      z-index: 10;
    }
    @keyframes bubblePop {
      from { opacity:0; transform: scale(0.7); }
      to   { opacity:1; transform: scale(1); }
    }
    /* tail pointing DOWN (from bubble toward card) */
    .bubble-down::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 7px solid transparent;
      border-top-color: #e53e3e;
    }
    .bubble-down::before {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-top: -2px;
      border: 7px solid transparent;
      border-top-color: #fff;
      z-index: 1;
    }
    /* tail pointing DOWN-RIGHT (toward copy button) */
    .bubble-copy::after {
      content: '';
      position: absolute;
      top: 100%;
      right: 14px;
      border: 7px solid transparent;
      border-top-color: #e53e3e;
    }
    .bubble-copy::before {
      content: '';
      position: absolute;
      top: 100%;
      right: 14px;
      margin-top: -2px;
      border: 7px solid transparent;
      border-top-color: #fff;
      z-index: 1;
    }
    .card-code-wrap { position: relative; }
    .copy-wrap { position: relative; display: inline-block; }
  </style>
</head>
<body>
  <div class="content">
    <a class="back-btn" href="index.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>

    <h1>
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </h1>
    <p class="subtitle">Your EFM account</p>

    <!-- Account info -->
    <div class="card">
      <div class="card-title">Account</div>
      <div class="row">
        <span class="row-label">Name</span>
        <span class="row-value" id="val-name">—</span>
      </div>
      <div class="row">
        <span class="row-label">Favorite Color</span>
        <span class="row-value" id="val-fv">—</span>
        <div class="color-dot" id="dot-fv"></div>
      </div>
      <div class="row">
        <span class="row-label">2nd Color</span>
        <span class="row-value" id="val-sfv">—</span>
        <div class="color-dot" id="dot-sfv"></div>
      </div>
    </div>

    <!-- Account code -->
    <div class="card-code-wrap">
      <div class="bubble bubble-down" id="important-bubble" style="bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);">Important!</div>
      <div class="card">
        <div class="card-title">Account Password</div>
        <div class="row">
          <span class="row-label">Log Out</span>
          <button class="logout-btn" id="logout-btn">Log Out</button>
        </div>
        <div class="row" id="pass-display-row">
          <span class="row-label">Password</span>
          <span class="code-badge" id="val-password" style="letter-spacing:0.18em;">••••••••</span>
          <div style="display:flex;gap:6px;flex-shrink:0;">
            <div class="copy-wrap">
              <div class="bubble bubble-copy" id="copy-bubble" style="bottom:calc(100% + 10px);right:0;">Copy this! ↓</div>
              <button class="copy-btn" id="copy-btn" style="min-width:54px;">Show</button>
            </div>
            <button id="edit-pass-btn" title="Change password" style="width:32px;height:32px;border:1.5px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;transition:border-color 0.15s;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </div>
        </div>
        <div id="pass-edit-row" style="display:none;margin-top:10px;">
          <input id="new-pass-input" type="password" placeholder="New password" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:0.92rem;box-sizing:border-box;outline:none;margin-bottom:8px;font-family:system-ui,sans-serif;">
          <input id="new-pass-confirm" type="password" placeholder="Confirm new password" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:0.92rem;box-sizing:border-box;outline:none;margin-bottom:8px;font-family:system-ui,sans-serif;">
          <div id="pass-edit-err" style="font-size:0.78rem;color:#c0392b;min-height:16px;margin-bottom:6px;"></div>
          <div style="display:flex;gap:8px;">
            <button id="pass-save-btn" style="flex:1;padding:9px;background:#0f0f13;color:#fff;border:none;border-radius:8px;font-size:0.88rem;font-weight:600;cursor:pointer;font-family:system-ui,sans-serif;">Save</button>
            <button id="pass-cancel-btn" style="flex:1;padding:9px;background:#f0f0f0;color:#333;border:none;border-radius:8px;font-size:0.88rem;font-weight:600;cursor:pointer;font-family:system-ui,sans-serif;">Cancel</button>
          </div>
        </div>
        <p style="font-size:0.8rem;color:#aaa;margin-top:10px;line-height:1.5;">
          Use your email and password to log in from any browser or device.
        </p>
      </div>
    </div>

    <!-- Danger zone -->
    <div class="card">
      <div class="card-title">Danger Zone</div>
      <button class="danger-btn" id="reset-btn">Delete Account</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="cursors.js"></script>
  <script>
    // Redirect to home if not set up yet
    if (!localStorage.getItem('efm_cursor_name')) {
      window.location.href = 'index.html';
    }

    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function () { t.classList.remove('show'); }, 2200);
    }

    function loadInfo() {
      var name  = localStorage.getItem('efm_cursor_name')  || '—';
      var fv    = localStorage.getItem('efm_cursor_color')  || null;
      var sfv   = localStorage.getItem('efm_cursor_color2') || null;
      document.getElementById('val-name').textContent = name;
      document.getElementById('val-fv').textContent   = fv  || '—';
      document.getElementById('val-sfv').textContent  = sfv || '—';

      var dotFV  = document.getElementById('dot-fv');
      var dotSFV = document.getElementById('dot-sfv');
      if (fv)  { dotFV.style.background  = fv;  dotFV.style.display  = 'block'; }
      else       dotFV.style.display = 'none';
      if (sfv) { dotSFV.style.background = sfv; dotSFV.style.display = 'block'; }
      else       dotSFV.style.display = 'none';
    }

    function dismissBubbles() {
      var ib = document.getElementById('important-bubble');
      var cb = document.getElementById('copy-bubble');
      if (ib) ib.style.display = 'none';
      if (cb) cb.style.display = 'none';
      localStorage.setItem('efm_code_copied', '1');
    }

    // Hide bubbles immediately if already copied before
    if (localStorage.getItem('efm_code_copied')) dismissBubbles();

    var passwordVisible = false;
    document.getElementById('copy-btn').addEventListener('click', function () {
      var pwd   = localStorage.getItem('efm_password') || '';
      if (!pwd) { showToast('Log out and back in once to save your password here.'); return; }
      passwordVisible = !passwordVisible;
      document.getElementById('val-password').textContent = passwordVisible ? pwd : '••••••••';
      this.textContent = passwordVisible ? 'Hide' : 'Show';
      dismissBubbles();
      // Trigger browser password-save prompt on first reveal
      if (passwordVisible) {
        var emailVal = localStorage.getItem('efm_cursor_email') || '';
        if (emailVal) {
          var f = document.createElement('form');
          f.method = 'post'; f.action = ''; f.style.display = 'none';
          var fe = document.createElement('input');
          fe.type = 'email'; fe.name = 'email'; fe.autocomplete = 'email'; fe.value = emailVal;
          var fp = document.createElement('input');
          fp.type = 'password'; fp.name = 'password'; fp.autocomplete = 'current-password'; fp.value = pwd;
          var fs = document.createElement('button'); fs.type = 'submit';
          f.appendChild(fe); f.appendChild(fp); f.appendChild(fs);
          f.addEventListener('submit', function(e) { e.preventDefault(); });
          document.body.appendChild(f);
          try { f.requestSubmit(fs); } catch(e) { fs.click(); }
          setTimeout(function() { document.body.removeChild(f); }, 500);
        }
      }
    });

    document.getElementById('edit-pass-btn').addEventListener('click', function () {
      document.getElementById('pass-edit-row').style.display = 'block';
      document.getElementById('new-pass-input').focus();
    });
    document.getElementById('pass-cancel-btn').addEventListener('click', function () {
      document.getElementById('pass-edit-row').style.display = 'none';
      document.getElementById('new-pass-input').value = '';
      document.getElementById('new-pass-confirm').value = '';
      document.getElementById('pass-edit-err').textContent = '';
    });
    document.getElementById('pass-save-btn').addEventListener('click', function () {
      var np  = document.getElementById('new-pass-input').value;
      var np2 = document.getElementById('new-pass-confirm').value;
      var err = document.getElementById('pass-edit-err');
      if (np.length < 6)  { err.textContent = 'Password must be at least 6 characters.'; return; }
      if (np !== np2)     { err.textContent = 'Passwords don\'t match.'; return; }
      var code  = localStorage.getItem('efm_account_code') || '';
      var email = localStorage.getItem('efm_cursor_email') || '';
      if (!code && !email) { err.textContent = 'Could not verify your account — try logging out and back in.'; return; }
      err.textContent = '';
      var btn = this; btn.disabled = true; btn.textContent = 'Saving…';
      var RAILWAY_URL = 'efm.ai-taichi.com';
      var WS_URL = window.location.hostname === 'localhost' ? 'ws://localhost:8080' : 'wss://' + RAILWAY_URL;
      var ws = new WebSocket(WS_URL);
      ws.onopen = function () { ws.send(JSON.stringify({type: 'change_password', code: code, new_password: np})); };
      ws.onmessage = function (e) {
        var d = JSON.parse(e.data);
        ws.close();
        if (d.type === 'change_password_ok') {
          localStorage.setItem('efm_password', np);
          showToast('Password updated!');
          document.getElementById('pass-cancel-btn').click();
        } else {
          err.textContent = d.message || 'Something went wrong.';
        }
        btn.disabled = false; btn.textContent = 'Save';
      };
      ws.onerror = function () { err.textContent = 'Connection error — try again.'; btn.disabled = false; btn.textContent = 'Save'; };
    });

    document.getElementById('logout-btn').addEventListener('click', function () {
      if (!confirm('Log out? You can log back in with your account code.')) return;
      localStorage.clear();
      document.cookie = 'efm_device_id=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/';
      window.location.href = 'index.html';
    });

    document.getElementById('reset-btn').addEventListener('click', function () {
      if (!confirm('Delete your EFM account? This cannot be undone.')) return;
      var code     = localStorage.getItem('efm_account_code') || '';
      var deviceId = localStorage.getItem('efm_cursor_id')    || '';
      function finish() {
        localStorage.clear();
        document.cookie = 'efm_device_id=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/';
        window.location.href = 'index.html';
      }
      if (window.efmDeleteAccount) {
        window.efmDeleteAccount(code, deviceId).then(finish).catch(finish);
      } else {
        finish();
      }
    });

    loadInfo();
  </script>
</body>
</html>
