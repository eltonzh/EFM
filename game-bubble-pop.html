<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png" id="favicon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubble Pop – EFM</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a1a; min-height:100vh; font-family:system-ui,sans-serif; display:flex; flex-direction:column; align-items:center; padding:16px; overflow:hidden; }
    .topbar { width:100%; max-width:560px; display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .back-btn { background:rgba(255,255,255,0.1); color:#fff; border:none; border-radius:20px; padding:8px 16px; font-size:13px; font-family:inherit; font-weight:600; cursor:pointer; }
    .back-btn:hover { background:rgba(255,255,255,0.18); }
    .coins-disp { background:rgba(255,255,255,0.08); color:#facc15; border-radius:20px; padding:6px 14px; font-size:14px; font-weight:800; display:flex; align-items:center; gap:5px; }
    .coin-ico { width:18px; height:18px; display:inline-block; vertical-align:middle; }

    .shell { width:100%; max-width:560px; background:#0f1129; border-radius:24px; border:1.5px solid #1e2460; overflow:hidden; position:relative; }

    .hud { background:#0b0e20; display:flex; justify-content:space-between; align-items:center; padding:10px 16px; gap:12px; }
    .hud-stat { text-align:center; }
    .hud-stat .val { font-size:20px; font-weight:900; color:#facc15; }
    .hud-stat .lbl { font-size:9px; font-weight:800; color:#4a5080; letter-spacing:.08em; }
    .hp-wrap { flex:1; display:flex; flex-direction:column; gap:3px; }
    .hp-label { font-size:9px; font-weight:800; color:#8890b0; letter-spacing:.06em; display:flex; justify-content:space-between; }
    .hp-bg { height:7px; background:#1a1f40; border-radius:99px; overflow:hidden; }
    .hp-bar { height:7px; border-radius:99px; background:linear-gradient(90deg,#f87171,#fb923c); transition:width .3s,background .3s; }
    .streak-badge { font-size:11px; font-weight:900; color:#f97316; min-width:60px; text-align:right; }

    .challenge-box { background:linear-gradient(135deg,#1a1060 0%,#0f1540 100%); padding:12px 20px; text-align:center; border-bottom:1px solid #1e2460; }
    .challenge-title { font-size:10px; font-weight:800; color:#6468a0; letter-spacing:.12em; text-transform:uppercase; margin-bottom:4px; }
    .challenge-text { font-size:22px; font-weight:900; color:#e0e4ff; letter-spacing:-0.5px; }
    .challenge-sub { font-size:12px; color:#6070b0; margin-top:2px; }

    canvas { width:100%; display:block; cursor:pointer; touch-action:none; }

    .progress-bar-wrap { background:#0b0e20; padding:8px 16px; display:flex; align-items:center; gap:10px; }
    .prog-bg { flex:1; height:6px; background:#1a1f40; border-radius:99px; overflow:hidden; }
    .prog-fill { height:6px; border-radius:99px; background:linear-gradient(90deg,#818cf8,#c084fc); transition:width .4s; }
    .prog-label { font-size:11px; font-weight:800; color:#818cf8; min-width:48px; text-align:right; }

    .flash-overlay { position:absolute; inset:0; border-radius:24px; pointer-events:none; opacity:0; transition:opacity .15s; }
    .flash-overlay.red { background:rgba(220,38,38,0.18); }
    .flash-overlay.green { background:rgba(34,197,94,0.12); }

    .end-screen { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); align-items:center; justify-content:center; z-index:100; }
    .end-screen.show { display:flex; }
    .end-card { background:#0f1129; border:1.5px solid #1e2460; border-radius:28px; padding:48px 36px; text-align:center; max-width:400px; width:90%; }
    .end-emoji { font-size:64px; margin-bottom:14px; }
    .end-title { font-size:28px; font-weight:900; color:#f1f5f9; margin-bottom:8px; }
    .end-sub { font-size:14px; color:#64748b; margin-bottom:8px; }
    .end-cash { font-size:22px; font-weight:900; margin-bottom:30px; }
    .end-cash.win { color:#4ade80; }
    .end-cash.lose { color:#f87171; }
    .end-btn { background:#facc15; color:#0f0f13; border:none; border-radius:22px; padding:14px 32px; font-size:16px; font-weight:900; font-family:inherit; cursor:pointer; margin:5px; }
    .end-btn.sec { background:#1e293b; color:#94a3b8; }
  </style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <div class="coins-disp"><img src="coin.svg" class="coin-ico"> <span id="coins-disp">0</span></div>
</div>

<div class="shell" id="shell">
  <div class="flash-overlay" id="flash"></div>

  <div class="hud">
    <div class="hud-stat">
      <div class="val" id="sc">0</div>
      <div class="lbl">SCORE</div>
    </div>
    <div class="hp-wrap">
      <div class="hp-label"><span>❤️ LIVES</span><span id="hp-num">5/5</span></div>
      <div class="hp-bg"><div class="hp-bar" id="hp-bar" style="width:100%"></div></div>
    </div>
    <div class="streak-badge" id="stk"></div>
  </div>

  <div class="challenge-box">
    <div class="challenge-title">Pop the bubbles that are…</div>
    <div class="challenge-text" id="chal-text">Loading…</div>
    <div class="challenge-sub" id="chal-sub"></div>
  </div>

  <canvas id="gc"></canvas>

  <div class="progress-bar-wrap">
    <div class="prog-bg"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-label" id="prog-label">0 / 12</div>
  </div>
</div>

<div class="end-screen" id="end-screen">
  <div class="end-card">
    <div class="end-emoji" id="end-emoji"></div>
    <div class="end-title" id="end-title"></div>
    <div class="end-sub" id="end-sub"></div>
    <div class="end-cash" id="end-cash"></div>
    <button class="end-btn" onclick="startGame()">Play Again</button>
    <button class="end-btn sec" onclick="history.back()">Back to Games</button>
  </div>
</div>

<script>
var cv = document.getElementById('gc');
var cx = cv.getContext('2d');
var W, H;

function resize() {
  var rect = cv.parentElement.getBoundingClientRect();
  W = rect.width;
  H = Math.round(W * 1.1);
  cv.width = W;
  cv.height = H;
}
resize();
window.addEventListener('resize', function() { resize(); });

// Coin tracking
function getCoins() { return parseInt(localStorage.getItem('efm_coins') || '0'); }
function setCoins(n) { n = Math.max(0, n); localStorage.setItem('efm_coins', n); document.getElementById('coins-disp').textContent = n; }
setCoins(getCoins());

// Challenge types
var challenges = [
  { text: 'EVEN NUMBERS',       sub: '…divisible by 2',          check: function(n){ return n % 2 === 0; } },
  { text: 'ODD NUMBERS',        sub: '…not divisible by 2',       check: function(n){ return n % 2 !== 0; } },
  { text: 'MULTIPLES OF 3',     sub: '…3, 6, 9, 12…',            check: function(n){ return n % 3 === 0; } },
  { text: 'MULTIPLES OF 4',     sub: '…4, 8, 12, 16…',           check: function(n){ return n % 4 === 0; } },
  { text: 'MULTIPLES OF 5',     sub: '…5, 10, 15, 20…',          check: function(n){ return n % 5 === 0; } },
  { text: 'PERFECT SQUARES',    sub: '…1, 4, 9, 16, 25, 36…',   check: isPerfectSquare },
  { text: 'PRIME NUMBERS',      sub: '…only divisible by 1 and themselves', check: isPrime },
  { text: 'GREATER THAN 50',    sub: '…any number above 50',      check: function(n){ return n > 50; } },
  { text: 'LESS THAN 30',       sub: '…any number below 30',      check: function(n){ return n < 30; } },
  { text: 'DIVISIBLE BY 6',     sub: '…6, 12, 18, 24…',          check: function(n){ return n % 6 === 0; } },
];

function isPrime(n) {
  if (n < 2) return false;
  for (var i = 2; i <= Math.sqrt(n); i++) if (n % i === 0) return false;
  return true;
}
function isPerfectSquare(n) {
  var s = Math.round(Math.sqrt(n));
  return s * s === n && n > 0;
}

// Game state
var MAX_HP = 5, WIN_COUNT = 12;
var hp, correct, score, streak, on, raf, challenge;
var bubbles = [], pops = [];
var spawnTimer = 0, spawnInterval = 60; // frames between spawns

var COLORS = [
  ['#818cf8','#4f46e5'], ['#f472b6','#db2777'], ['#34d399','#059669'],
  ['#fb923c','#ea580c'], ['#60a5fa','#2563eb'], ['#a78bfa','#7c3aed'],
  ['#f9a8d4','#ec4899'], ['#6ee7b7','#10b981'], ['#fcd34d','#d97706'],
];

function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

function spawnBubble() {
  var numPool = [];
  // Always include some correct and some wrong
  for (var i = 0; i < 20; i++) numPool.push(randInt(1, 99));
  // Pick a number — 50% chance correct, 50% wrong
  var isCorrect = Math.random() < 0.5;
  var n, tries = 0;
  do {
    n = randInt(1, 99);
    tries++;
  } while (tries < 50 && challenge.check(n) !== isCorrect);

  var col = COLORS[randInt(0, COLORS.length - 1)];
  var r = W * 0.072 + Math.random() * W * 0.022;
  var x = r + Math.random() * (W - r * 2);
  bubbles.push({
    x: x,
    y: H + r,
    r: r,
    n: n,
    col: col,
    speed: 0.7 + Math.random() * 0.6,
    wobble: Math.random() * Math.PI * 2,
    wobbleAmp: 0.4 + Math.random() * 0.8,
    wobbleSpeed: 0.025 + Math.random() * 0.02,
    alpha: 1,
    popping: false,
    popT: 0,
  });
}

function startGame() {
  document.getElementById('end-screen').classList.remove('show');
  hp = MAX_HP;
  correct = 0;
  score = 0;
  streak = 0;
  on = true;
  bubbles = [];
  pops = [];
  spawnTimer = 0;
  challenge = challenges[randInt(0, challenges.length - 1)];
  document.getElementById('chal-text').textContent = challenge.text;
  document.getElementById('chal-sub').textContent = challenge.sub;
  updateHUD();
  if (raf) cancelAnimationFrame(raf);
  loop();
}

function updateHUD() {
  document.getElementById('sc').textContent = score;
  document.getElementById('hp-num').textContent = hp + '/' + MAX_HP;
  document.getElementById('hp-bar').style.width = (hp / MAX_HP * 100) + '%';
  document.getElementById('hp-bar').style.background = hp > 2 ? 'linear-gradient(90deg,#4ade80,#22c55e)' : 'linear-gradient(90deg,#f87171,#ef4444)';
  var stk = document.getElementById('stk');
  stk.textContent = streak >= 2 ? '🔥 ×' + streak : '';
  var pct = correct / WIN_COUNT * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = correct + ' / ' + WIN_COUNT;
}

function flash(type) {
  var el = document.getElementById('flash');
  el.className = 'flash-overlay ' + type;
  el.style.opacity = '1';
  setTimeout(function() { el.style.opacity = '0'; }, 180);
}

function endGame(won) {
  on = false;
  cancelAnimationFrame(raf);
  var coins = getCoins();
  var delta, cashClass;
  if (won) {
    delta = 10 + (streak >= 5 ? 5 : 0);
    cashClass = 'win';
  } else {
    delta = -5;
    cashClass = 'lose';
  }
  setCoins(Math.max(0, coins + delta));
  document.getElementById('end-emoji').textContent = won ? '🎉' : '💥';
  document.getElementById('end-title').textContent = won ? 'You Win!' : 'Game Over';
  document.getElementById('end-sub').textContent = won
    ? 'You popped ' + WIN_COUNT + ' correct bubbles!'
    : 'The bubbles got away…';
  var ec = document.getElementById('end-cash');
  ec.className = 'end-cash ' + cashClass;
  ec.innerHTML = (won ? '+' : '') + delta + ' <img src="coin.svg" class="coin-ico">';
  document.getElementById('end-screen').classList.add('show');
}

// Pop particles
function addPop(x, y, correct) {
  for (var i = 0; i < 8; i++) {
    var angle = (i / 8) * Math.PI * 2;
    pops.push({
      x: x, y: y,
      vx: Math.cos(angle) * (2 + Math.random() * 3),
      vy: Math.sin(angle) * (2 + Math.random() * 3),
      r: 3 + Math.random() * 4,
      life: 1,
      col: correct ? '#4ade80' : '#f87171',
    });
  }
}

function drawBubble(b, t) {
  if (b.popping) {
    var s = 1 + b.popT * 0.5;
    cx.save();
    cx.globalAlpha = Math.max(0, 1 - b.popT * 2);
    cx.translate(b.x, b.y);
    cx.scale(s, s);
    cx.beginPath();
    cx.arc(0, 0, b.r, 0, Math.PI * 2);
    cx.fillStyle = b.col[0];
    cx.fill();
    cx.restore();
    return;
  }

  var wx = Math.sin(b.wobble) * b.wobbleAmp;
  cx.save();
  cx.globalAlpha = b.alpha;
  cx.translate(b.x + wx, b.y);

  // Shadow glow
  cx.shadowColor = b.col[0];
  cx.shadowBlur = 18;

  // Gradient fill
  var grad = cx.createRadialGradient(-b.r * 0.3, -b.r * 0.3, b.r * 0.1, 0, 0, b.r);
  grad.addColorStop(0, b.col[0] + 'ee');
  grad.addColorStop(1, b.col[1] + 'cc');
  cx.beginPath();
  cx.arc(0, 0, b.r, 0, Math.PI * 2);
  cx.fillStyle = grad;
  cx.fill();

  // Shine
  cx.shadowBlur = 0;
  cx.beginPath();
  cx.arc(-b.r * 0.28, -b.r * 0.28, b.r * 0.28, 0, Math.PI * 2);
  cx.fillStyle = 'rgba(255,255,255,0.25)';
  cx.fill();

  // Number
  cx.fillStyle = '#fff';
  cx.font = 'bold ' + Math.round(b.r * 0.72) + 'px system-ui';
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText(b.n, 0, 1);

  cx.restore();
}

function loop() {
  cx.clearRect(0, 0, W, H);

  // Subtle grid dots
  cx.fillStyle = 'rgba(255,255,255,0.04)';
  for (var gx = 20; gx < W; gx += 40) {
    for (var gy = 20; gy < H; gy += 40) {
      cx.beginPath();
      cx.arc(gx, gy, 1.5, 0, Math.PI * 2);
      cx.fill();
    }
  }

  if (!on) return;

  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnTimer = 0;
    spawnBubble();
    if (spawnInterval > 30) spawnInterval -= 0.4;
  }

  var now = Date.now();
  for (var i = bubbles.length - 1; i >= 0; i--) {
    var b = bubbles[i];
    b.wobble += b.wobbleSpeed;

    if (b.popping) {
      b.popT += 0.12;
      if (b.popT > 1) { bubbles.splice(i, 1); continue; }
    } else {
      b.y -= b.speed;
      // Escaped
      if (b.y + b.r < 0) {
        if (challenge.check(b.n)) {
          // Correct bubble escaped — lose HP
          hp--;
          streak = 0;
          flash('red');
          updateHUD();
          if (hp <= 0) { bubbles.splice(i, 1); endGame(false); return; }
        }
        bubbles.splice(i, 1);
        continue;
      }
    }
    drawBubble(b);
  }

  // Pop particles
  for (var j = pops.length - 1; j >= 0; j--) {
    var p = pops[j];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.06;
    if (p.life <= 0) { pops.splice(j, 1); continue; }
    cx.globalAlpha = p.life;
    cx.fillStyle = p.col;
    cx.beginPath();
    cx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    cx.fill();
    cx.globalAlpha = 1;
  }

  raf = requestAnimationFrame(loop);
}

function hitBubble(px, py) {
  for (var i = bubbles.length - 1; i >= 0; i--) {
    var b = bubbles[i];
    if (b.popping) continue;
    var wx = Math.sin(b.wobble) * b.wobbleAmp;
    var dx = px - (b.x + wx);
    var dy = py - b.y;
    if (dx * dx + dy * dy < b.r * b.r) {
      var isCorrect = challenge.check(b.n);
      b.popping = true;
      b.popT = 0;
      addPop(b.x + wx, b.y, isCorrect);

      if (isCorrect) {
        score++;
        correct++;
        streak++;
        flash('green');
        updateHUD();
        if (correct >= WIN_COUNT) { endGame(true); return; }
      } else {
        hp--;
        streak = 0;
        flash('red');
        updateHUD();
        if (hp <= 0) { endGame(false); return; }
      }
      return;
    }
  }
}

cv.addEventListener('click', function(e) {
  if (!on) return;
  var rect = cv.getBoundingClientRect();
  var scaleX = cv.width / rect.width;
  var scaleY = cv.height / rect.height;
  hitBubble((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
});
cv.addEventListener('touchstart', function(e) {
  if (!on) return;
  e.preventDefault();
  var rect = cv.getBoundingClientRect();
  var scaleX = cv.width / rect.width;
  var scaleY = cv.height / rect.height;
  var t = e.changedTouches[0];
  hitBubble((t.clientX - rect.left) * scaleX, (t.clientY - rect.top) * scaleY);
}, { passive: false });

startGame();
</script>
</body>
</html>
