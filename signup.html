<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png" id="favicon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up – EFM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <a href="index.html" style="position:fixed;top:12px;right:72px;z-index:100;"><img src="logo-transparent.png" style="height:40px;opacity:0.8;"></a>
  <div id="form-container" style="width:66.67vw; margin: 80px auto 0; padding: 0 24px;">
    <h1 style="font-size:2.6rem; font-weight:800; color:#0f0f13; text-align:center; margin-bottom:4px;">EFM</h1>
    <p style="text-align:center; color:#555; font-size:1rem; margin-bottom:36px;">Elton's Fun Math</p>

    <!-- Sign up section -->
    <div id="signup-section">
      <p style="font-weight:700; font-size:1.05rem; color:#0f0f13; margin-bottom:18px;">Create an account...</p>
      <input id="signup-email" type="email" placeholder="Email address" style="width:100%; padding:14px 16px; font-size:1rem; border:1.5px solid #ddd; border-radius:10px; margin-bottom:12px; outline:none; font-family:system-ui,sans-serif;">
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <input id="signup-name" type="text" placeholder="Your name" style="flex:1; padding:14px 16px; font-size:1rem; border:1.5px solid #ddd; border-radius:10px; outline:none; font-family:system-ui,sans-serif;">
        <input id="signup-initial" type="text" maxlength="1" placeholder="Last Initial" style="width:130px; padding:14px 16px; font-size:1rem; border:1.5px solid #ddd; border-radius:10px; outline:none; font-family:system-ui,sans-serif;">
      </div>
      <div style="position:relative;margin-bottom:12px;">
        <input id="signup-pass" type="password" placeholder="Password (min 6 chars)" style="width:100%; padding:14px 48px 14px 16px; font-size:1rem; border:1.5px solid #ddd; border-radius:10px; outline:none; font-family:system-ui,sans-serif;">
        <button type="button" onclick="togglePass('signup-pass',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:#aaa;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div style="position:relative;margin-bottom:12px;">
        <input id="signup-pass2" type="password" placeholder="Confirm password" style="width:100%; padding:14px 48px 14px 16px; font-size:1rem; border:1.5px solid #ddd; border-radius:10px; outline:none; font-family:system-ui,sans-serif;">
        <button type="button" onclick="togglePass('signup-pass2',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:#aaa;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <p id="signup-err" style="color:#e53e3e; font-size:0.9rem; margin-bottom:10px; min-height:18px;"></p>
      <button onclick="doSignup()" style="width:100%; padding:14px; font-size:1rem; font-weight:700; background:#0f0f13; color:#fff; border:none; border-radius:10px; cursor:pointer; margin-bottom:12px; font-family:system-ui,sans-serif;">Sign up</button>
    </div>

    <!-- Shown after successful signup / while polling -->
    <div id="pending-section" style="display:none; text-align:center; padding:40px 0;">
      <div id="pending-icon" style="font-size:2.5rem; margin-bottom:16px;">&#128337;</div>
      <p id="pending-title" style="font-weight:700; font-size:1.2rem; color:#0f0f13; margin-bottom:10px;">Account access pending.</p>
      <p id="pending-sub" style="color:#555; font-size:1rem;">This may take a few days.</p>
      <button id="start-btn" onclick="location.href='index.html'" style="display:none; margin-top:24px; padding:14px 40px; font-size:1rem; font-weight:700; background:#27ae60; color:#fff; border:none; border-radius:10px; cursor:pointer; font-family:system-ui,sans-serif;">Start</button>
    </div>

    <!-- Divider -->
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
      <div style="flex:1; height:1px; background:#ddd;"></div>
      <span style="color:#aaa; font-size:0.9rem;">or</span>
      <div style="flex:1; height:1px; background:#ddd;"></div>
    </div>

    <!-- Log in section -->
    <div id="login-section">
      <p style="font-weight:700; font-size:1.05rem; color:#0f0f13; margin-bottom:18px;">Log in...</p>
      <input id="login-email" type="email" placeholder="Email" style="width:100%; padding:14px 16px; font-size:1rem; border:1.5px solid #ddd; border-radius:10px; margin-bottom:12px; outline:none; font-family:system-ui,sans-serif;">
      <div style="position:relative;margin-bottom:12px;">
        <input id="login-pass" type="password" placeholder="Password" style="width:100%; padding:14px 48px 14px 16px; font-size:1rem; border:1.5px solid #ddd; border-radius:10px; outline:none; font-family:system-ui,sans-serif;">
        <button type="button" onclick="togglePass('login-pass',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:#aaa;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <p id="login-err" style="color:#e53e3e; font-size:0.9rem; margin-bottom:10px; min-height:18px;"></p>
      <button onclick="doLogin()" style="width:100%; padding:14px; font-size:1rem; font-weight:700; background:#0f0f13; color:#fff; border:none; border-radius:10px; cursor:pointer; font-family:system-ui,sans-serif;">Log in</button>
    </div>
  </div>

  <script>
    var EYE_ON  = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    var EYE_OFF = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    function togglePass(id, btn) {
      var inp = document.getElementById(id);
      if (inp.type === 'password') { inp.type = 'text';     btn.innerHTML = EYE_OFF; }
      else                         { inp.type = 'password'; btn.innerHTML = EYE_ON;  }
    }

    var SWATCH_COLORS = [
      '#c0392b','#d35400','#c2185b','#8e44ad',
      '#2980b9','#16a085','#27ae60','#2c3e50',
      '#795548','#607d8b','#e67e22','#0f0f13',
      '#DC143C','#FF2400','#9B111E','#800020','#800000',
      '#FF007F','#FF6B6B','#FA8072','#FF00FF','#DD77FF',
      '#DA70D6','#DE5D83',
      '#FFBF00','#F4C430','#F28500','#FFCBA4','#FBCEB1',
      '#FFD700','#FFDB58','#FFFF99','#FFF44F',
      '#50C878','#808000','#BCB88A','#98FF98','#00A86B',
      '#32CD32','#228B22','#008080','#7FFF00','#AACC00',
      '#0F52BA','#4B0082','#0047AB','#001F5B','#007BA7',
      '#40E0D0','#967BB6','#C8A2C8','#9966CC','#DDA0DD',
      '#483C32','#704214','#A0522D','#CC7722','#36454F',
      '#708090','#F5F5DC','#555D50','#F2F0E6',
      '#3EB489','#9FE2BF','#ACE1AF','#B0E0E6','#87CEEB',
      '#8A9A86','#8A9A5B','#93C572',
      '#4CBB17','#4169E1','#7DF9FF',
      '#000080','#191970','#355E3B','#01796F',
      '#00FFFF','#7FFFD4','#00CCCC'
    ];

    function showColorPicker(firstName, subtitle) {
      return new Promise(function(resolve) {
        var selected = SWATCH_COLORS[4];
        var overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:999999;font-family:system-ui,sans-serif;';
        var card = document.createElement('div');
        card.style.cssText = 'background:#fff;border-radius:14px;padding:28px 24px;box-shadow:0 8px 40px rgba(0,0,0,0.25);width:360px;text-align:center;max-height:90vh;overflow-y:auto;';
        var preview = document.createElement('div');
        preview.style.cssText = 'width:40px;height:40px;border-radius:50%;background:' + selected + ';margin:0 auto 14px;box-shadow:0 2px 8px rgba(0,0,0,0.2);transition:background 0.15s;';
        var heading = document.createElement('div');
        heading.style.cssText = 'font-size:1.05rem;font-weight:700;color:#111;margin-bottom:4px;';
        heading.textContent = 'Hi ' + firstName + '!';
        var sub = document.createElement('div');
        sub.style.cssText = 'font-size:0.82rem;color:#888;margin-bottom:18px;';
        sub.textContent = subtitle || 'Pick your favorite color';
        var grid = document.createElement('div');
        grid.style.cssText = 'display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin-bottom:20px;justify-items:center;';
        SWATCH_COLORS.forEach(function(c) {
          var sw = document.createElement('button');
          sw.style.cssText = 'width:26px;height:26px;border-radius:50%;background:' + c + ';border:3px solid ' + (c === selected ? '#fff' : 'transparent') + ';box-shadow:' + (c === selected ? '0 0 0 2px ' + c : 'none') + ';cursor:pointer;outline:none;padding:0;';
          sw.addEventListener('mouseenter', function() { sw.style.transform = 'scale(1.15)'; });
          sw.addEventListener('mouseleave', function() { sw.style.transform = ''; });
          sw.addEventListener('click', function() {
            selected = c;
            preview.style.background = c;
            grid.querySelectorAll('button').forEach(function(b) { b.style.border = '3px solid transparent'; b.style.boxShadow = 'none'; });
            sw.style.border = '3px solid #fff';
            sw.style.boxShadow = '0 0 0 2px ' + c;
          });
          grid.appendChild(sw);
        });
        var btn = document.createElement('button');
        btn.style.cssText = 'width:100%;padding:11px;background:#0f0f13;color:#fff;border:none;border-radius:8px;font-size:0.95rem;font-weight:600;cursor:pointer;letter-spacing:0.02em;font-family:system-ui,sans-serif;';
        btn.textContent = 'Select';
        btn.addEventListener('click', function() { overlay.remove(); resolve(selected); });
        card.appendChild(preview);
        card.appendChild(heading);
        card.appendChild(sub);
        card.appendChild(grid);
        card.appendChild(btn);
        overlay.appendChild(card);
        document.body.appendChild(overlay);
      });
    }

    function startApprovalPolling() {
      if (approvalPollInterval) return;
      approvalPollInterval = setInterval(function() {
        if (!approvalEmail) return;
        var sock = getWS();
        var msg = JSON.stringify({type: 'check_approval', email: approvalEmail});
        if (authWsReady) sock.send(msg);
      }, 4000);
    }

    function stopApprovalPolling() {
      clearInterval(approvalPollInterval);
      approvalPollInterval = null;
      localStorage.removeItem('efm_pending_approval_email');
    }

    function showApprovalResult(status) {
      var icon  = document.getElementById('pending-icon');
      var title = document.getElementById('pending-title');
      var sub   = document.getElementById('pending-sub');
      var btn   = document.getElementById('start-btn');
      if (status === 'approved') {
        icon.textContent  = '✓';
        icon.style.color  = '#27ae60';
        title.textContent = 'Account Access Approved!';
        title.style.color = '#27ae60';
        sub.style.display = 'none';
        btn.style.display = 'inline-block';
      } else {
        icon.textContent  = '✕';
        icon.style.color  = '#e53e3e';
        title.textContent = 'Account Access Denied.';
        title.style.color = '#e53e3e';
        sub.textContent   = 'Please try again.';
      }
    }

    function launchShootingStar() {
      var overlay = document.getElementById('accept-overlay');
      var card    = document.getElementById('accept-card');
      if (!card) return;

      // Phase 1: shrink card into a glowing gold dot (0.38s)
      card.style.transition = 'transform 0.38s ease-in, border-radius 0.38s, background 0.38s 0.1s, box-shadow 0.38s, color 0.15s';
      card.style.transformOrigin = 'center center';
      card.style.transform  = 'scale(0.06)';
      card.style.borderRadius = '50%';
      card.style.background = '#FFD700';
      card.style.boxShadow  = '0 0 40px 20px #FFD700, 0 0 80px 40px rgba(255,215,0,0.45)';
      card.style.color = 'transparent';
      overlay.style.transition = 'background 0.38s';
      overlay.style.background = 'transparent';

      setTimeout(function() {
        // Phase 2: release a star from the card's position and shoot it to bottom-right
        var rect = card.getBoundingClientRect();
        var cx = rect.left + rect.width / 2;
        var cy = rect.top  + rect.height / 2;
        card.style.display = 'none';

        var star = document.createElement('div');
        star.style.cssText = [
          'position:fixed;',
          'left:' + cx + 'px;top:' + cy + 'px;',
          'width:18px;height:18px;margin:-9px 0 0 -9px;',
          'border-radius:50%;',
          'background:radial-gradient(circle, #fffbe6 20%, #FFD700 60%, transparent 100%);',
          'box-shadow:0 0 14px 7px #FFD700, 0 0 28px 14px rgba(255,215,0,0.55),',
          '-14px -14px 10px 4px rgba(255,255,180,0.65),',
          '-28px -28px 7px 1px rgba(255,215,0,0.3);',
          'z-index:1000000;pointer-events:none;',
          'transition:transform 0.72s cubic-bezier(0.22,0,1,0.6), opacity 0.28s 0.48s ease-in;'
        ].join('');
        document.body.appendChild(star);

        var dx = window.innerWidth  - cx + 60;
        var dy = window.innerHeight - cy + 60;
        requestAnimationFrame(function() { requestAnimationFrame(function() {
          star.style.transform = 'translate(' + dx + 'px,' + dy + 'px) scale(0.08)';
          star.style.opacity   = '0';
        }); });

        setTimeout(function() { star.remove(); overlay.remove(); }, 900);
      }, 400);
    }

    function afterAuth(name) {
      var firstName = name.split(' ')[0];
      showColorPicker(firstName)
        .then(function(c1) {
          localStorage.setItem('efm_cursor_color', c1);
          return showColorPicker(firstName, 'Pick another color');
        })
        .then(function(c2) {
          localStorage.setItem('efm_cursor_color2', c2);
          location.href = 'index.html';
        });
    }

    var WS_URL = (location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.host;
    var authWs = null;
    var authWsReady = false;
    var pendingAction = null;
    var savedPass = '';
    var approvalPollInterval = null;
    var approvalEmail = '';

    function getWS() {
      if (authWs && authWs.readyState === 1) return authWs;
      authWs = new WebSocket(WS_URL);
      authWs.onopen = function() {
        authWsReady = true;
        if (pendingAction) { pendingAction(); pendingAction = null; }
      };
      authWs.onmessage = function(e) {
        var d = JSON.parse(e.data);
        if (d.type === 'approved_ok') {
          launchShootingStar();
        } else if (d.type === 'approve_error') {
          var card = document.getElementById('accept-card');
          if (card) card.innerHTML = '<p style="color:#e53e3e;font-weight:700;font-size:1rem;">' + d.message + '</p>';
        } else if (d.type === 'approval_status') {
          if (d.status === 'approved') {
            stopApprovalPolling();
            showApprovalResult('approved');
          } else if (d.status === 'denied') {
            stopApprovalPolling();
            showApprovalResult('denied');
          }
        } else if (d.type === 'register_ok') {
          approvalEmail = document.getElementById('signup-email').value.trim();
          localStorage.setItem('efm_pending_approval_email', approvalEmail);
          document.getElementById('signup-section').style.display = 'none';
          document.getElementById('pending-section').style.display = '';
          startApprovalPolling();
        } else if (d.type === 'register_error') {
          document.getElementById('signup-err').textContent = d.message;
        } else if (d.type === 'login_ok') {
          var name = d.name || '';
          if (name) { localStorage.setItem('efm_user_name', name); localStorage.setItem('efm_cursor_name', name); }
          if (d.code) localStorage.setItem('efm_account_code', d.code);
          if (d.fv)  localStorage.setItem('efm_cursor_color',  d.fv);
          if (d.sfv) localStorage.setItem('efm_cursor_color2', d.sfv);
          localStorage.setItem('efm_cursor_email', document.getElementById('login-email').value.trim());
          if (savedPass) { localStorage.setItem('efm_password', savedPass); savedPass = ''; }
          if (d.fv) { location.href = 'index.html'; } else { afterAuth(name || 'there'); }
        } else if (d.type === 'login_error') {
          document.getElementById('login-err').textContent = d.message;
        }
      };
      return authWs;
    }

    function doSignup() {
      var email   = document.getElementById('signup-email').value.trim();
      var initial = document.getElementById('signup-initial').value.trim().replace('.','');
      var name    = document.getElementById('signup-name').value.trim() + (initial ? ' ' + initial.toUpperCase() + '.' : '');
      var pass  = document.getElementById('signup-pass').value;
      var pass2 = document.getElementById('signup-pass2').value;
      document.getElementById('signup-err').textContent = '';
      if (!email || !name.trim() || !pass) { document.getElementById('signup-err').textContent = 'Please fill in all fields.'; return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('signup-err').textContent = 'Please enter a valid email address.'; return; }
      if (pass !== pass2) { document.getElementById('signup-err').textContent = 'Passwords do not match.'; return; }
      if (pass.length < 6) { document.getElementById('signup-err').textContent = 'Password must be at least 6 characters.'; return; }
      var sock = getWS();
      var msg = JSON.stringify({type:'register', email:email, name:name, password:pass});
      if (authWsReady) { sock.send(msg); } else { pendingAction = function(){ sock.send(msg); }; }
    }

    function doLogin() {
      var email = document.getElementById('login-email').value.trim();
      var pass  = document.getElementById('login-pass').value;
      document.getElementById('login-err').textContent = '';
      if (!email || !pass) { document.getElementById('login-err').textContent = 'Please fill in all fields.'; return; }
      savedPass = pass;
      var sock = getWS();
      var msg = JSON.stringify({type:'login', email:email, password:pass});
      if (authWsReady) { sock.send(msg); } else { pendingAction = function(){ sock.send(msg); }; }
    }

    getWS();

    // Resume polling if user returns to the page while still pending
    (function() {
      var stored = localStorage.getItem('efm_pending_approval_email');
      if (!stored) return;
      approvalEmail = stored;
      document.getElementById('form-container').style.display = 'none';
      document.getElementById('pending-section').style.display = '';
      startApprovalPolling();
    })();

    // Approve mode: ?approve=TOKEN in URL (Elton clicks "Accept Account" in email)
    (function() {
      var token = new URLSearchParams(window.location.search).get('approve');
      if (!token) return;

      // Hide the normal form UI
      document.getElementById('form-container').style.display = 'none';

      // Build the "Account Accepted!" overlay
      var overlay = document.createElement('div');
      overlay.id = 'accept-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:99999;';
      var card = document.createElement('div');
      card.id = 'accept-card';
      card.style.cssText = 'background:#fff;border-radius:14px;padding:44px 36px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.25);max-width:320px;width:90%;';
      card.innerHTML = '<div style="font-size:3rem;margin-bottom:14px;">&#10003;</div><p style="font-size:1.4rem;font-weight:800;color:#0f0f13;margin:0;">Account Accepted!</p>';
      overlay.appendChild(card);
      document.body.appendChild(overlay);

      // Send approval to server
      var sock = getWS();
      var msg  = JSON.stringify({type: 'approve_account', token: token});
      if (authWsReady) { sock.send(msg); } else { pendingAction = function() { sock.send(msg); }; }
    })();
  </script>

</body>
</html>
