<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png" id="favicon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up – EFM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <a href="index.html" style="position:fixed;top:12px;right:72px;z-index:100;"><img src="logo-transparent.png" style="height:40px;opacity:0.8;"></a>
  <div style="width:66.67vw; margin: 80px auto 0; padding: 0 24px;">
    <h1 style="font-size:2.6rem; font-weight:800; color:#0f0f13; text-align:center; margin-bottom:4px;">EFM</h1>
    <p style="text-align:center; color:#555; font-size:1rem; margin-bottom:36px;">Elton's Fun Math</p>

    <!-- Sign up section -->
    <div id="signup-section">
      <p style="font-weight:700; font-size:1.05rem; color:#0f0f13; margin-bottom:18px;">Create an account...</p>
      <input id="signup-email" type="email" placeholder="Email address" style="width:100%; padding:14px 16px; font-size:1rem; border:1.5px solid #ddd; border-radius:10px; margin-bottom:12px; outline:none; font-family:system-ui,sans-serif;">
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <input id="signup-name" type="text" placeholder="Your name" style="flex:1; padding:14px 16px; font-size:1rem; border:1.5px solid #ddd; border-radius:10px; outline:none; font-family:system-ui,sans-serif;">
        <input id="signup-initial" type="text" maxlength="1" placeholder="Last Initial" style="width:130px; padding:14px 16px; font-size:1rem; border:1.5px solid #ddd; border-radius:10px; outline:none; font-family:system-ui,sans-serif;">
      </div>
      <input id="signup-pass" type="password" placeholder="Password (min 6 chars)" style="width:100%; padding:14px 16px; font-size:1rem; border:1.5px solid #ddd; border-radius:10px; margin-bottom:12px; outline:none; font-family:system-ui,sans-serif;">
      <input id="signup-pass2" type="password" placeholder="Confirm password" style="width:100%; padding:14px 16px; font-size:1rem; border:1.5px solid #ddd; border-radius:10px; margin-bottom:12px; outline:none; font-family:system-ui,sans-serif;">
      <p id="signup-err" style="color:#e53e3e; font-size:0.9rem; margin-bottom:10px; min-height:18px;"></p>
      <button onclick="doSignup()" style="width:100%; padding:14px; font-size:1rem; font-weight:700; background:#0f0f13; color:#fff; border:none; border-radius:10px; cursor:pointer; margin-bottom:12px; font-family:system-ui,sans-serif;">Sign up</button>
    </div>

    <!-- Verification code section (shown after email is sent) -->
    <div id="verify-section" style="display:none;">
      <p style="font-weight:700; font-size:1.05rem; color:#0f0f13; margin-bottom:8px;">We've sent an email to you in Gmail. Check your inbox immediately!</p>
      <p id="verify-hint" style="color:#555; font-size:0.95rem; margin-bottom:18px;"></p>
      <input id="verify-code" type="text" inputmode="numeric" maxlength="6" placeholder="Enter 6-digit code here" style="width:100%; padding:14px 16px; font-size:1rem; border:1.5px solid #ddd; border-radius:10px; margin-bottom:12px; outline:none; font-family:system-ui,sans-serif;">
      <p id="verify-err" style="color:#e53e3e; font-size:0.9rem; margin-bottom:10px; min-height:18px;"></p>
      <button onclick="doVerify()" style="width:100%; padding:14px; font-size:1rem; font-weight:700; background:#0f0f13; color:#fff; border:none; border-radius:10px; cursor:pointer; margin-bottom:12px; font-family:system-ui,sans-serif;">Verify &amp; Create Account</button>
      <button onclick="cancelVerify()" style="width:100%; padding:12px; font-size:0.95rem; font-weight:600; background:#fff; color:#555; border:1.5px solid #ddd; border-radius:10px; cursor:pointer; font-family:system-ui,sans-serif;">Back</button>
    </div>

    <!-- Divider -->
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
      <div style="flex:1; height:1px; background:#ddd;"></div>
      <span style="color:#aaa; font-size:0.9rem;">or</span>
      <div style="flex:1; height:1px; background:#ddd;"></div>
    </div>

    <!-- Log in section -->
    <div id="login-section">
      <p style="font-weight:700; font-size:1.05rem; color:#0f0f13; margin-bottom:18px;">Log in...</p>
      <input id="login-email" type="email" placeholder="Email" style="width:100%; padding:14px 16px; font-size:1rem; border:1.5px solid #ddd; border-radius:10px; margin-bottom:12px; outline:none; font-family:system-ui,sans-serif;">
      <input id="login-pass" type="password" placeholder="Password" style="width:100%; padding:14px 16px; font-size:1rem; border:1.5px solid #ddd; border-radius:10px; margin-bottom:12px; outline:none; font-family:system-ui,sans-serif;">
      <p id="login-err" style="color:#e53e3e; font-size:0.9rem; margin-bottom:10px; min-height:18px;"></p>
      <button onclick="doLogin()" style="width:100%; padding:14px; font-size:1rem; font-weight:700; background:#0f0f13; color:#fff; border:none; border-radius:10px; cursor:pointer; font-family:system-ui,sans-serif;">Log in</button>
    </div>
  </div>

  <script>
    var WS_URL = (location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.host;
    var authWs = null;
    var authWsReady = false;
    var pendingAction = null;
    var pendingEmail = '';

    function getWS() {
      if (authWs && authWs.readyState === 1) return authWs;
      authWs = new WebSocket(WS_URL);
      authWs.onopen = function() {
        authWsReady = true;
        if (pendingAction) { pendingAction(); pendingAction = null; }
      };
      authWs.onmessage = function(e) {
        var d = JSON.parse(e.data);
        if (d.type === 'verification_sent') {
          pendingEmail = d.email;
          document.getElementById('signup-section').style.display = 'none';
          document.getElementById('verify-section').style.display = '';
          document.getElementById('verify-hint').textContent = 'We sent a 6-digit code to ' + d.email + '. Enter it below to finish creating your account.';
          document.getElementById('verify-code').focus();
        } else if (d.type === 'register_ok') {
          var formName = document.getElementById('signup-name').value.trim();
          localStorage.setItem('efm_cursor_name', d.name || formName);
          localStorage.setItem('efm_account_code', d.code);
          localStorage.setItem('efm_cursor_email', pendingEmail || document.getElementById('signup-email').value.trim());
          if (!localStorage.getItem('efm_cursor_color')) localStorage.setItem('efm_cursor_color', '#5a9fd4');
          if (!localStorage.getItem('efm_cursor_color2')) localStorage.setItem('efm_cursor_color2', '#4a9e4a');
          localStorage.setItem('efm_tutorial_step', '1');
          location.href = 'index.html';
        } else if (d.type === 'register_error') {
          document.getElementById('signup-err').textContent = d.message;
          document.getElementById('verify-err').textContent = d.message;
        } else if (d.type === 'verify_error') {
          document.getElementById('verify-err').textContent = d.message;
        } else if (d.type === 'login_ok') {
          if (d.name) { localStorage.setItem('efm_user_name', d.name); localStorage.setItem('efm_cursor_name', d.name); }
          if (d.code) localStorage.setItem('efm_account_code', d.code);
          if (d.fv)  localStorage.setItem('efm_cursor_color',  d.fv);
          if (d.sfv) localStorage.setItem('efm_cursor_color2', d.sfv);
          localStorage.setItem('efm_cursor_email', document.getElementById('login-email').value.trim());
          location.href = 'index.html';
        } else if (d.type === 'login_error') {
          document.getElementById('login-err').textContent = d.message;
        }
      };
      return authWs;
    }

    function doSignup() {
      var email   = document.getElementById('signup-email').value.trim();
      var initial = document.getElementById('signup-initial').value.trim().replace('.','');
      var name    = document.getElementById('signup-name').value.trim() + (initial ? ' ' + initial.toUpperCase() + '.' : '');
      var pass  = document.getElementById('signup-pass').value;
      var pass2 = document.getElementById('signup-pass2').value;
      document.getElementById('signup-err').textContent = '';
      if (!email || !name || !pass) { document.getElementById('signup-err').textContent = 'Please fill in all fields.'; return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('signup-err').textContent = 'Please enter a valid email address.'; return; }
      if (pass !== pass2) { document.getElementById('signup-err').textContent = 'Passwords do not match.'; return; }
      if (pass.length < 6) { document.getElementById('signup-err').textContent = 'Password must be at least 6 characters.'; return; }
      var sock = getWS();
      var msg = JSON.stringify({type:'send_verification', email:email, name:name, password:pass});
      if (authWsReady) { sock.send(msg); } else { pendingAction = function(){ sock.send(msg); }; }
    }

    function doVerify() {
      var code = document.getElementById('verify-code').value.trim();
      document.getElementById('verify-err').textContent = '';
      if (code.length !== 6) { document.getElementById('verify-err').textContent = 'Please enter the 6-digit code.'; return; }
      var sock = getWS();
      var msg = JSON.stringify({type:'verify_code', email:pendingEmail, code:code});
      if (authWsReady) { sock.send(msg); } else { pendingAction = function(){ sock.send(msg); }; }
    }

    function cancelVerify() {
      pendingEmail = '';
      document.getElementById('verify-section').style.display = 'none';
      document.getElementById('verify-code').value = '';
      document.getElementById('verify-err').textContent = '';
      document.getElementById('signup-section').style.display = '';
    }

    function doLogin() {
      var email = document.getElementById('login-email').value.trim();
      var pass  = document.getElementById('login-pass').value;
      document.getElementById('login-err').textContent = '';
      if (!email || !pass) { document.getElementById('login-err').textContent = 'Please fill in all fields.'; return; }
      var sock = getWS();
      var msg = JSON.stringify({type:'login', email:email, password:pass});
      if (authWsReady) { sock.send(msg); } else { pendingAction = function(){ sock.send(msg); }; }
    }

    getWS();
  </script>

</body>
</html>
