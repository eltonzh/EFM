<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png" id="favicon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games – EFM (Elton's Fun Math)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f0f0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px;
    }
    .topbar {
      width: 100%;
      max-width: 920px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
    }
    .back-btn {
      background: #0f0f13;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      font-weight: 600;
    }
    .back-btn:hover { background: #333; }
    h1 { font-size: 30px; font-weight: 900; color: #0f0f13; letter-spacing: -0.5px; }
    .content { width: 100%; max-width: 920px; display: flex; flex-direction: column; gap: 40px; }

    .section-label {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
    }
    .section-label h2 { font-size: 17px; font-weight: 800; color: #0f0f13; text-transform: uppercase; letter-spacing: 0.06em; }
    .section-line { flex: 1; height: 1px; background: #d4d4d4; }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    /* Real game card */
    .game-card {
      background: #fff;
      border-radius: 18px;
      padding: 22px 18px 18px;
      display: flex; flex-direction: column; gap: 8px;
      text-decoration: none;
      border: 1.5px solid #e8e8e8;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }
    .game-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .game-card-icon {
      font-size: 36px; line-height: 1;
      margin-bottom: 4px;
    }
    .game-card-name { font-size: 15px; font-weight: 800; color: #0f0f13; }
    .game-card-desc { font-size: 12px; color: #888; line-height: 1.4; }
    .game-card-play {
      margin-top: auto;
      padding-top: 12px;
      font-size: 13px;
      font-weight: 700;
      color: #0f0f13;
    }

    /* Lock card */
    .lock-card {
      background: #fafafa;
      border-radius: 18px;
      padding: 22px 18px 18px;
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; text-align: center;
      border: 1.5px dashed #ccc;
    }
    .lock-card-icon { font-size: 28px; }
    .lock-card-title { font-size: 14px; font-weight: 800; color: #555; }
    .lock-card-desc { font-size: 12px; color: #999; line-height: 1.4; }
    .take-test-btn {
      margin-top: 8px;
      background: #0f0f13;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.12s;
    }
    .take-test-btn:hover { background: #333; }
    .adv-lock-btn {
      margin-top: 8px;
      background: #e8e8e8;
      color: #999;
      border: none;
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: default;
    }

    /* Modal */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: #fff; border-radius: 24px; padding: 32px;
      max-width: 420px; width: 92%;
      box-shadow: 0 12px 48px rgba(0,0,0,0.2);
    }
    .modal-header { margin-bottom: 20px; }
    .modal-header h2 { font-size: 22px; font-weight: 900; color: #0f0f13; margin-bottom: 4px; }
    .modal-header p { font-size: 13px; color: #888; }
    .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .progress-bar-bg { flex: 1; background: #eee; border-radius: 99px; height: 6px; }
    .progress-bar { background: #0f0f13; border-radius: 99px; height: 6px; transition: width 0.3s; }
    .progress-num { font-size: 13px; font-weight: 700; color: #888; white-space: nowrap; }
    .q-display {
      font-size: 30px; font-weight: 900; text-align: center;
      margin-bottom: 20px; color: #0f0f13; letter-spacing: -0.5px;
    }
    .answer-row { display: flex; gap: 10px; margin-bottom: 14px; }
    #answer-input {
      flex: 1; border: 2px solid #e8e8e8; border-radius: 14px;
      padding: 14px 18px; font-size: 22px; font-weight: 800;
      font-family: inherit; color: #0f0f13; outline: none;
      text-align: center; transition: border-color 0.15s;
    }
    #answer-input:focus { border-color: #0f0f13; }
    #answer-input.correct { border-color: #16a34a; background: #dcfce7; color: #166534; }
    #answer-input.wrong   { border-color: #dc2626; background: #fee2e2; color: #991b1b; }
    #submit-btn {
      background: #0f0f13; color: #fff; border: none; border-radius: 14px;
      padding: 14px 22px; font-size: 15px; font-weight: 800;
      font-family: inherit; cursor: pointer; transition: background 0.12s;
    }
    #submit-btn:hover { background: #333; }
    #submit-btn:disabled { background: #ccc; cursor: default; }
    .modal-feedback { text-align: center; font-size: 14px; font-weight: 600; min-height: 20px; color: #555; }
    .result-area { text-align: center; padding: 8px 0; }
    .result-big { font-size: 48px; font-weight: 900; margin-bottom: 6px; }
    .result-sub { font-size: 15px; color: #666; margin-bottom: 24px; line-height: 1.5; }
    .res-btn {
      background: #0f0f13; color: #fff; border: none; border-radius: 22px;
      padding: 12px 28px; font-size: 15px; font-family: inherit;
      font-weight: 700; cursor: pointer; margin: 4px;
    }
    .res-btn.secondary { background: #eee; color: #555; }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">← Back</button>
    <h1>🎮 Games</h1>
    <div style="width:80px;"></div>
  </div>

  <div class="content">

    <div>
      <div class="section-label">
        <h2>Beginner</h2>
        <div class="section-line"></div>
      </div>
      <div class="games-grid">
        <div class="lock-card" style="border-style:dashed;">
          <div class="lock-card-icon">🚧</div>
          <div class="lock-card-title">Coming soon</div>
          <div class="lock-card-desc">Beginner games are on the way</div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-label">
        <h2>Intermediate</h2>
        <div class="section-line"></div>
      </div>
      <div class="games-grid" id="intermediate-grid">
        <!-- filled by JS -->
      </div>
    </div>

    <div>
      <div class="section-label">
        <h2>Advanced</h2>
        <div class="section-line"></div>
      </div>
      <div class="games-grid" id="advanced-grid">
        <!-- filled by JS -->
      </div>
    </div>

    <div>
      <div class="section-label">
        <h2>For Fun</h2>
        <div class="section-line"></div>
      </div>
      <div class="games-grid">
        <a class="game-card" href="game-golden-trail.html">
          <div class="game-card-icon">✨</div>
          <div class="game-card-name">Golden Trail</div>
          <div class="game-card-desc">Move your glowing orb and paint the board gold</div>
          <div class="game-card-play">Play →</div>
        </a>
      </div>
    </div>

  </div>

  <!-- Test modal -->
  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <div class="modal-header">
        <h2>Beginner Test</h2>
        <p>+, −, ×, ÷ under 100 &nbsp;·&nbsp; Need 15 out of 15 to pass</p>
      </div>
      <div class="progress-row">
        <div class="progress-bar-bg"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
        <div class="progress-num" id="prog-num">0 / 15</div>
      </div>
      <div id="test-body">
        <div class="q-display" id="q-display"></div>
        <div class="answer-row">
          <input id="answer-input" type="text" inputmode="numeric" autocomplete="off">
          <button id="submit-btn" onclick="submitAnswer()">Go</button>
        </div>
        <div class="modal-feedback" id="modal-feedback"></div>
      </div>
      <div class="result-area" id="result-area" style="display:none;"></div>
    </div>
  </div>

  <script>
    var PASS_SCORE = 15, TOTAL = 15;
    var questions = [], qi = 0, score = 0, answered = false;

    var intermediateGames = [
      { name: 'Exponential Mountaineer', icon: '⛰️', desc: 'Climb to the summit by solving exponent problems', href: 'game-exponential-mountaineer.html' },
      { name: 'Meteor Math', icon: '☄️', desc: 'Blast 15 meteors to save the city. Win: +10 🪙  Lose: −5 🪙', href: 'game-meteor-math-easy.html' }
    ];

    var advancedGames = [
      { name: 'Meteor Math: Hard', icon: '☄️', desc: 'Exponent meteors fall fast. Win: +10 🪙  Lose: −5 🪙', href: 'game-meteor-math.html' }
    ];

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function makeQuestion() {
      var ops = ['+', '-', '×', '÷'];
      var op = ops[rand(0, 3)];
      var a, b, ans;
      if (op === '+') { a = rand(1, 90); b = rand(1, 99 - a); ans = a + b; }
      else if (op === '-') { a = rand(2, 99); b = rand(1, a - 1); ans = a - b; }
      else if (op === '×') { a = rand(2, 12); b = rand(2, 9); ans = a * b; }
      else { ans = rand(2, 12); b = rand(2, 9); a = ans * b; }
      return { text: a + ' ' + op + ' ' + b + ' = ?', ans: ans };
    }

    function renderIntermediate() {
      var grid = document.getElementById('intermediate-grid');
      grid.innerHTML = '';
      if (localStorage.getItem('efm_games_intermediate_unlocked')) {
        intermediateGames.forEach(function(g) {
          var a = document.createElement('a');
          a.className = 'game-card';
          a.href = g.href;
          a.innerHTML = '<div class="game-card-icon">' + g.icon + '</div>' +
            '<div class="game-card-name">' + g.name + '</div>' +
            '<div class="game-card-desc">' + g.desc + '</div>' +
            '<div class="game-card-play">Play →</div>';
          grid.appendChild(a);
        });
      } else {
        var card = document.createElement('div');
        card.className = 'lock-card';
        card.id = 'intermediate-lock-card';
        card.innerHTML = '<div class="lock-card-icon">🔒</div>' +
          '<div class="lock-card-title">Locked</div>' +
          '<div class="lock-card-desc">Pass the Beginner test to unlock Intermediate</div>' +
          '<button class="take-test-btn" onclick="openTest()">Take the test</button>';
        grid.appendChild(card);
      }
    }

    function renderAdvanced() {
      var grid = document.getElementById('advanced-grid');
      grid.innerHTML = '';
      if (localStorage.getItem('efm_games_intermediate_unlocked')) {
        advancedGames.forEach(function(g) {
          var a = document.createElement('a');
          a.className = 'game-card';
          a.href = g.href;
          a.innerHTML = '<div class="game-card-icon">' + g.icon + '</div>' +
            '<div class="game-card-name">' + g.name + '</div>' +
            '<div class="game-card-desc">' + g.desc + '</div>' +
            '<div class="game-card-play">Play →</div>';
          grid.appendChild(a);
        });
      } else {
        var card = document.createElement('div');
        card.className = 'lock-card';
        card.innerHTML = '<div class="lock-card-icon">🔒</div>' +
          '<div class="lock-card-title">Locked</div>' +
          '<div class="lock-card-desc">Unlock Intermediate first</div>' +
          '<button class="adv-lock-btn" disabled>Locked</button>';
        grid.appendChild(card);
      }
    }

    function openTest() {
      questions = [];
      for (var i = 0; i < TOTAL; i++) questions.push(makeQuestion());
      qi = 0; score = 0;
      document.getElementById('result-area').style.display = 'none';
      document.getElementById('test-body').style.display = 'block';
      document.getElementById('modal-bg').classList.add('open');
      showQuestion();
    }

    function showQuestion() {
      answered = false;
      var q = questions[qi];
      document.getElementById('q-display').textContent = q.text;
      document.getElementById('prog-bar').style.width = (qi / TOTAL * 100) + '%';
      document.getElementById('prog-num').textContent = qi + ' / ' + TOTAL;
      document.getElementById('modal-feedback').textContent = '';
      var inp = document.getElementById('answer-input');
      inp.value = '';
      inp.className = '';
      inp.disabled = false;
      document.getElementById('submit-btn').disabled = false;
      inp.focus();
    }

    function submitAnswer() {
      if (answered) return;
      var inp = document.getElementById('answer-input');
      var val = inp.value.trim();
      if (val === '') return;
      answered = true;
      inp.disabled = true;
      document.getElementById('submit-btn').disabled = true;
      var correct = questions[qi].ans;
      if (parseInt(val, 10) === correct) {
        inp.classList.add('correct');
        score++;
        document.getElementById('modal-feedback').textContent = '✓ Correct!';
      } else {
        inp.classList.add('wrong');
        document.getElementById('modal-feedback').textContent = 'The answer was ' + correct;
      }
      setTimeout(function() { qi++; if (qi >= TOTAL) showResult(); else showQuestion(); }, 900);
    }

    function showResult() {
      document.getElementById('prog-bar').style.width = '100%';
      document.getElementById('prog-num').textContent = TOTAL + ' / ' + TOTAL;
      document.getElementById('test-body').style.display = 'none';
      var passed = score >= PASS_SCORE;
      var ra = document.getElementById('result-area');
      ra.style.display = 'block';
      if (passed) {
        ra.innerHTML = '<div class="result-big">🎉</div>' +
          '<div class="result-sub"><strong>' + score + ' / ' + TOTAL + '</strong> — You passed!<br>Intermediate is now unlocked.</div>' +
          '<button class="res-btn" onclick="closeTest(true)">Let\'s go!</button>';
      } else {
        ra.innerHTML = '<div class="result-big">😅</div>' +
          '<div class="result-sub"><strong>' + score + ' / ' + TOTAL + '</strong> — Need ' + PASS_SCORE + '/' + TOTAL + '.<br>Give it another try!</div>' +
          '<button class="res-btn" onclick="openTest()">Try again</button>' +
          '<button class="res-btn secondary" onclick="closeTest(false)">Close</button>';
      }
    }

    function closeTest(passed) {
      document.getElementById('modal-bg').classList.remove('open');
      if (passed) {
        localStorage.setItem('efm_games_intermediate_unlocked', '1');
        renderIntermediate();
        renderAdvanced();
      }
    }

    document.getElementById('answer-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') submitAnswer();
    });

    renderIntermediate();
    renderAdvanced();
  </script>
</body>
</html>
