  <script>
    (function() {
      var cx = 80, cy = 100;
      var NS = 'http://www.w3.org/2000/svg';

      // 180 straight rays
      [document.getElementById('shine-rays')].forEach(function(g) {
        for (var angle = 0; angle < 360; angle += 2) {
          var rad = angle * Math.PI / 180;
          var dx = Math.sin(rad);
          var dy = -Math.cos(rad);
          var line = document.createElementNS(NS, 'line');
          line.setAttribute('x1', cx);
          line.setAttribute('y1', cy);
          line.setAttribute('x2', (cx + 5000 * dx).toFixed(2));
          line.setAttribute('y2', (cy + 5000 * dy).toFixed(2));
          line.setAttribute('stroke', '#FFE97A');
          line.setAttribute('stroke-width', '1.8');
          line.setAttribute('stroke-linecap', 'round');
          line.setAttribute('opacity', '0.85');
          g.appendChild(line);
        }
      });

      // Wavy corona rings
      function wavyRingPath(r, amp, waves) {
        var d = '';
        var pts = 360;
        for (var i = 0; i <= pts; i++) {
          var a = (i / pts) * Math.PI * 2 - Math.PI / 2;
          var wr = r + amp * Math.sin(waves * a);
          var x = cx + wr * Math.cos(a);
          var y = cy + wr * Math.sin(a);
          d += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
        }
        return d + 'Z';
      }

      [document.getElementById('corona-rings')].forEach(function(rings) {
        [
          {r: 38,  amp: 4, waves: 7,  op: 0.9, w: 3.5},
          {r: 60,  amp: 5, waves: 9,  op: 0.75, w: 3.0},
          {r: 85,  amp: 6, waves: 11, op: 0.6,  w: 2.5},
          {r: 110, amp: 7, waves: 13, op: 0.45, w: 2.0},
          {r: 135, amp: 8, waves: 15, op: 0.3,  w: 1.5},
        ].forEach(function(cfg) {
          var path = document.createElementNS(NS, 'path');
          path.setAttribute('d', wavyRingPath(cfg.r, cfg.amp, cfg.waves));
          path.setAttribute('fill', 'none');
          path.setAttribute('stroke', '#FFD700');
          path.setAttribute('stroke-width', cfg.w);
          path.setAttribute('opacity', cfg.op);
          rings.appendChild(path);
        });
      });
    })();
  </script>

  <script>
    function fitTitle() {
      var text = document.getElementById('title-text');
      var startX = 72, startY = 35;
      var endX = window.innerWidth - 6;
      var endY = window.innerHeight - 6;
      var dx = endX - startX;
      var dy = endY - startY;
      var diagLen = Math.sqrt(dx * dx + dy * dy);
      var extra = -2 * 37.8;
      endX += (dx / diagLen) * extra;
      endY += (dy / diagLen) * extra;
      dx = endX - startX;
      dy = endY - startY;
      var len = Math.sqrt(dx * dx + dy * dy);
      var angle = Math.atan2(dy, dx) * 180 / Math.PI;
      var rad = angle * Math.PI / 180;

      text.setAttribute('x', startX);
      text.setAttribute('y', startY);
      text.setAttribute('transform', 'rotate(' + angle + ',' + startX + ',' + startY + ')');

      // Measure advance width and glyph height at 100px reference size
      text.style.fontSize = '100px';
      var naturalLen = text.getComputedTextLength();
      var box = text.getBBox();
      // Distance from rotation anchor (startY) to glyph bottom in local SVG coords
      var effH = Math.max(box.y + box.height - startY, box.height * 0.5);

      // Original formula — identical to before, non-fullscreen is unchanged
      var fontSize = (len / naturalLen) * 100;

      // Only shrink if the rotated glyph bottom would actually clip the viewport.
      // bottomY = where the end of the last glyph lands in viewport y-coordinates.
      var bottomY = startY
        + (naturalLen * fontSize / 100) * Math.sin(rad)
        + (effH       * fontSize / 100) * Math.cos(rad);
      if (bottomY > window.innerHeight + 8) {
        fontSize *= (window.innerHeight - 4 - startY) / (bottomY - startY);
      }

      text.style.fontSize = fontSize + 'px';
    }
    var fitTimer;
    fitTitle();
    window.addEventListener('resize', function() {
      fitTitle();
      // Re-run after the macOS fullscreen animation settles (~500 ms)
      clearTimeout(fitTimer);
      fitTimer = setTimeout(fitTitle, 600);
    });
  </script>
