<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80">
  <!-- shadow -->
  <ellipse cx="50" cy="76" rx="38" ry="5" fill="rgba(0,0,0,0.18)"/>
  <!-- chest body -->
  <rect x="8" y="38" width="84" height="36" rx="5" fill="#7c4a1e"/>
  <rect x="10" y="40" width="80" height="32" rx="4" fill="#9b5e28"/>
  <!-- chest lid -->
  <rect x="8" y="16" width="84" height="26" rx="6" fill="#7c4a1e"/>
  <rect x="10" y="18" width="80" height="22" rx="5" fill="#9b5e28"/>
  <!-- lid arc highlight -->
  <path d="M14 18 Q50 10 86 18" fill="none" stroke="#c47a3a" stroke-width="3" stroke-linecap="round"/>
  <!-- gold trim - bottom -->
  <rect x="8" y="36" width="84" height="6" rx="2" fill="#d4a017"/>
  <rect x="10" y="37" width="80" height="4" rx="1" fill="#f0c040"/>
