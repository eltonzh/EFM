  <rect x="8" y="40" width="84" height="4" rx="1" fill="#d4a017"/>
  <!-- vertical straps -->
  <rect x="20" y="16" width="6" height="58" rx="2" fill="#d4a017"/>
  <rect x="21" y="17" width="4" height="56" rx="1" fill="#f0c040"/>
  <rect x="74" y="16" width="6" height="58" rx="2" fill="#d4a017"/>
  <rect x="75" y="17" width="4" height="56" rx="1" fill="#f0c040"/>
  <!-- lock plate -->
  <rect x="40" y="34" width="20" height="16" rx="3" fill="#d4a017"/>
  <rect x="41" y="35" width="18" height="14" rx="2" fill="#f0c040"/>
  <!-- lock shackle -->
  <path d="M45 35 L45 30 A5 5 0 0 1 55 30 L55 35" fill="none" stroke="#d4a017" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M45 35 L45 30 A5 5 0 0 1 55 30 L55 35" fill="none" stroke="#f0c040" stroke-width="2" stroke-linecap="round"/>
  <!-- keyhole -->
  <circle cx="50" cy="41" r="3" fill="#7c4a1e"/>
  <rect x="48.5" y="41" width="3" height="5" rx="1" fill="#7c4a1e"/>
  <!-- coins spilling out -->
  <ellipse cx="36" cy="72" rx="8" ry="3.5" fill="#b8860b"/>
  <ellipse cx="36" cy="70" rx="8" ry="3.5" fill="#ffd700"/>
  <ellipse cx="36" cy="70" rx="5" ry="2" fill="#ffe97a"/>
  <ellipse cx="58" cy="73" rx="7" ry="3" fill="#b8860b"/>
  <ellipse cx="58" cy="71" rx="7" ry="3" fill="#ffd700"/>
  <ellipse cx="58" cy="71" rx="4.5" ry="1.8" fill="#ffe97a"/>
  <ellipse cx="48" cy="74" rx="6" ry="2.5" fill="#b8860b"/>
  <ellipse cx="48" cy="72" rx="6" ry="2.5" fill="#ffd700"/>
  <ellipse cx="48" cy="72" rx="4" ry="1.5" fill="#ffe97a"/>
