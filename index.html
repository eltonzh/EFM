  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(
        135deg,
        #4a9e4a 0% 33%,
        #5a9fd4 33% 66%,
        #ffb347 66% 100%
      );
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .zone {
      position: fixed;
      overflow: hidden;
      pointer-events: none;
    }
    .zone-left  { top: 0; left: 0;   width: 50%; height: 100vh; }
    .zone-right { top: 0; left: 50%; width: 50%; height: 100vh; }

    .sym {
      position: absolute;
      font-family: system-ui, sans-serif;
      color: rgba(0,0,0,0.12);
      font-size: 2rem;
      white-space: nowrap;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }
    .sym:nth-child(2n)   { animation-delay: -0.3s; }
    .sym:nth-child(3n)   { animation-delay: -0.7s; }
    .sym:nth-child(4n)   { animation-delay: -1.1s; }
    .sym:nth-child(5n)   { animation-delay: -1.5s; }
    .sym:nth-child(6n)   { animation-delay: -0.9s; }
    .sym:nth-child(7n)   { animation-delay: -1.8s; }


    .bubbl {
      position: absolute;
      border-radius: 50%;
      opacity: 0.75;
      animation: bob 4s ease-in-out infinite;
    }
    @keyframes bob {
      0%,100% { transform: translate(-50%,-50%); }
      50%      { transform: translate(-50%, calc(-50% - 18px)); }
    }

  </style>
</head>

  <script>
    var LOCKABLE_IDS = ['nav-chars-l','nav-chars-r','nav-notebook','nav-games','nav-create','nav-settings','nav-reset','nav-chat','nav-inventory','nav-events'];

    function applyLockedState() {
      LOCKABLE_IDS.forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.classList.add('nav-lockable');
      });
      var ctaLink = document.getElementById('cta-link');
      var ctaBtn  = document.getElementById('cta-btn');
      if (ctaLink) ctaLink.removeAttribute('href');
      if (ctaBtn) {
        ctaBtn.textContent = 'Go!';
        ctaBtn.style.background = '#2a7a2a';
        ctaBtn.onclick = function(e) { e.preventDefault(); location.href = 'signup.html'; };
      }
    }

    function removeLockedState() {
      LOCKABLE_IDS.forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.classList.remove('nav-lockable');
      });
      var ctaLink = document.getElementById('cta-link');
      var ctaBtn  = document.getElementById('cta-btn');
      if (ctaLink) ctaLink.href = 'efm_version_k.html';
      if (ctaBtn) {
        ctaBtn.textContent = "Let's Get Started!";
        ctaBtn.style.background = '#0f0f13';
        ctaBtn.onclick = null;
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      if (!localStorage.getItem('efm_cursor_name')) applyLockedState();
    });
    window.addEventListener('efm_setup_complete', removeLockedState);

    function resetProgress() {
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:999999;font-family:system-ui,sans-serif;';
      overlay.innerHTML = [
        '<div style="background:#fff;border-radius:14px;padding:32px 28px;box-shadow:0 8px 40px rgba(0,0,0,0.25);width:320px;text-align:center;">',
          '<div style="font-size:1.1rem;font-weight:700;color:#111;margin-bottom:10px;">Reset Progress</div>',
          '<div style="font-size:0.9rem;color:#555;margin-bottom:24px;line-height:1.5;">Are you sure you want to reset all the progress you\'ve made in this website?</div>',
          '<div style="display:flex;gap:10px;">',
            '<button id="_rp_cancel" style="flex:1;padding:11px;background:#f0f0f0;color:#333;border:none;border-radius:8px;font-size:0.95rem;font-weight:600;cursor:pointer;font-family:system-ui,sans-serif;">Cancel</button>',
            '<button id="_rp_confirm" style="flex:1;padding:11px;background:#c0392b;color:#fff;border:none;border-radius:8px;font-size:0.95rem;font-weight:600;cursor:pointer;font-family:system-ui,sans-serif;">Reset</button>',
          '</div>',
        '</div>'
      ].join('');
      document.body.appendChild(overlay);
      document.getElementById('_rp_cancel').addEventListener('click', function() { overlay.remove(); });
      document.getElementById('_rp_confirm').addEventListener('click', function() {
        ['efm_started','p4sc','p4f1','p4f2','mathCoins','p4progress','efm_cursor_name','efm_cursor_color','efm_cursor_color2'].forEach(function(k){ localStorage.removeItem(k); });
        localStorage.setItem('efm_reset', '1');
        window.location.reload();
      });
    }
  </script>
