<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png" id="favicon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EFM Group Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f13;
      height: 100dvh;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: row;
    }
    #side-bar {
      width: 56px;
      background: #1a1a20;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 0;
      gap: 18px;
      flex-shrink: 0;
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    #side-bar img { width: 32px; opacity: 0.9; }
    #side-bar a {
      color: #fff;
      font-size: 1.1rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 10px;
      transition: background 0.12s;
    }
    #side-bar a:hover { background: rgba(255,255,255,0.12); }
    #side-bar a.active { background: rgba(42,122,42,0.35); }
    #chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    #chat-header {
      background: #0f0f13;
      border-top: 12px solid #0f0f13;
      padding: 14px 18px 14px calc(18px + 0.5cm);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    @media (min-width: 600px) {
      #chat-header {
        padding-top: 0;
        padding-left: 0.5cm;
        align-items: flex-start;
      }
      #chat-header .back,
      #chat-header .dot,
      #chat-header .title {
        margin-top: 0;
        padding-top: 0;
      }
    }
    #chat-header .back {
      color: rgba(255,255,255,0.6);
      font-size: 0.85rem;
      text-decoration: none;
      margin-right: 4px;
    }
    #chat-header .back:hover { color: #fff; }
    #chat-header .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #2a7a2a;
      flex-shrink: 0;
    }
    #chat-header .title {
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }
    #info-bar {
      background: #c8e6c8;
      border-bottom: 1px solid #a8cca8;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #info-bar span {
      font-size: 0.78rem;
      color: #1e4a1e;
      flex: 1;
    }
    #history-btn {
      white-space: nowrap;
      font-size: 0.78rem;
      font-weight: 600;
      font-family: system-ui, sans-serif;
      background: #2a7a2a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 5px 12px;
      cursor: pointer;
      flex-shrink: 0;
    }
    #history-btn:active { background: #1e5a1e; }
    #msgs {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fff;
    }
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #2a5a2a;
      font-size: 0.9rem;
      opacity: 0.6;
      text-align: center;
      gap: 8px;
      padding: 32px;
    }
    #empty-state .big { font-size: 2rem; }
    .msg-row { display: flex; flex-direction: column; max-width: 80%; }
    .msg-row.own { align-self: flex-end; align-items: flex-end; }
    .msg-row.other { align-self: flex-start; align-items: flex-start; }
    .msg-name {
      font-size: 0.72rem;
      color: #2a5a2a;
      margin-bottom: 3px;
      padding: 0 4px;
    }
    .msg-bubble {
      padding: 9px 13px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.45;
      word-break: break-word;
    }
    .msg-row.own .msg-bubble {
      background: #2a7a2a;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-row.other .msg-bubble {
      background: rgba(255,255,255,0.75);
      color: #0f0f13;
      border-bottom-left-radius: 4px;
    }
    .msg-time {
      font-size: 0.68rem;
      color: rgba(0,0,0,0.35);
      margin-top: 3px;
      padding: 0 4px;
    }
    .msg-actions {
      display: flex; gap: 4px; margin-bottom: 3px; align-self: flex-end;
      opacity: 0; pointer-events: none; transition: opacity 0.12s;
    }
    .msg-row.own:hover .msg-actions { opacity: 1; pointer-events: auto; }
    .msg-action-btn {
      font-size: 0.68rem; font-weight: 600; padding: 2px 9px;
      border: none; border-radius: 6px; cursor: pointer;
      font-family: system-ui, sans-serif; background: rgba(0,0,0,0.1); color: #444;
    }
    .msg-action-btn.del { color: #c0392b; }
    .msg-action-btn:hover { background: rgba(0,0,0,0.18); }
    #input-bar {
      background: #fff;
      border-top: 1px solid rgba(0,0,0,0.08);
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1;
      border: 1.5px solid rgba(0,0,0,0.12);
      border-radius: 99px;
      padding: 9px 15px;
      font-size: 0.9rem;
      font-family: system-ui, sans-serif;
      outline: none;
      background: #f7f7f7;
    }
    #msg-input:focus { border-color: #2a7a2a; background: #fff; }
    #send-btn {
      background: #2a7a2a;
      color: #fff;
      border: none;
      border-radius: 99px;
      padding: 9px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: system-ui, sans-serif;
      cursor: pointer;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    #send-btn:active { background: #1e5a1e; }
  </style>
</head>
<body>

  <div id="side-bar">
    <img src="logo-white.png" alt="EFM">
    <a href="index.html" title="Home">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
    </a>
    <a href="group-chat.html" class="active" title="Chat">💬</a>
    <a href="chat-history.html" title="History">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="9.5"/>
        <polyline points="12,6.5 12,12 15.5,14.5"/>
      </svg>
    </a>
    <a href="https://chat.openai.com" target="_blank" title="ChatGPT" style="width:32px;height:32px;">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.77.77 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855l-5.833-3.387L15.119 7.2a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.407-.667zm2.01-3.023l-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08L8.704 5.46a.795.795 0 0 0-.393.681zm1.097-2.365l2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5z"/>
      </svg>
    </a>
    <a id="claude-btn" href="#" title="Ask Claude" style="width:32px;height:32px;" onclick="toggleClaudeMode(event)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg">
        <line x1="12" y1="2.5" x2="12" y2="21.5"/>
        <line x1="7.25" y1="20.23" x2="16.75" y2="3.77"/>
        <line x1="3.77" y1="16.75" x2="20.23" y2="7.25"/>
        <line x1="2.5" y1="12" x2="21.5" y2="12"/>
        <line x1="3.77" y1="7.25" x2="20.23" y2="16.75"/>
        <line x1="7.25" y1="3.77" x2="16.75" y2="20.23"/>
      </svg>
    </a>
  </div>

  <div id="chat-main">
  <div id="chat-header">
    <a href="index.html" class="back">← Back</a>
    <span class="title">EFM Group Chat</span>
    <img src="logo-white.png" style="height:24px;opacity:0.85;margin-left:auto;">
  </div>

  <div id="info-bar">
    <span>Resets Daily. Go to History if you want to see what's been up in the past month!</span>
    <button id="history-btn" onclick="window.location.href='chat-history.html'">Go to Chat History</button>
  </div>

  <div id="msgs">
    <div id="empty-state">
      <div class="big">💬</div>
      <div>No messages yet today.</div>
      <div>Say something!</div>
    </div>
  </div>

  <div id="input-bar">
    <input id="msg-input" type="text" placeholder="Type a message..." maxlength="500" autocomplete="off" />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    var myName = localStorage.getItem('efm_cursor_name') || 'Guest';
    var chatWs;

    // All the named colors the user wants for other people's bubbles
    var CHAT_COLORS = [
      '#DC143C','#FF2400','#9B111E','#800020','#800000',
      '#FF007F','#FF6B6B','#FA8072','#FF00FF','#DD77FF',
      '#FFBF00','#F4C430','#F28500','#FFCBA4','#FBCEB1',
      '#FFD700','#FFDB58','#FFFF99','#FFF44F','#FFFDD0',
      '#50C878','#808000','#BCB88A','#98FF98','#00A86B',
      '#32CD32','#228B22','#008080','#7FFF00','#AACC00',
      '#0F52BA','#4B0082','#0047AB','#001F5B','#007BA7',
      '#40E0D0','#967BB6','#C8A2C8','#9966CC','#DDA0DD',
      '#483C32','#704214','#A0522D','#CC7722','#36454F',
      '#708090','#FFFFF0','#F5F5DC','#555D50','#F2F0E6'
    ];
    var nameColorMap = {};
    var chatColorIdx = 0;

    function getNameColor(name) {
      if (!nameColorMap[name]) {
        nameColorMap[name] = CHAT_COLORS[chatColorIdx % CHAT_COLORS.length];
        chatColorIdx++;
      }
      return nameColorMap[name];
    }

    function luminance(hex) {
      if (!hex || hex[0] !== '#' || hex.length < 7) return 0.5;
      var r = parseInt(hex.slice(1,3),16)/255;
      var g = parseInt(hex.slice(3,5),16)/255;
      var b = parseInt(hex.slice(5,7),16)/255;
      return 0.299*r + 0.587*g + 0.114*b;
    }

    function applyUserColor() {
      var c = localStorage.getItem('efm_cursor_color') || '#2a7a2a';
      myName = localStorage.getItem('efm_cursor_name') || 'Guest';
      var el = document.getElementById('_efm_color');
      if (!el) { el = document.createElement('style'); el.id = '_efm_color'; document.head.appendChild(el); }
      el.textContent = '#info-bar{background:' + c + ';border-bottom-color:' + c + '} #info-bar span{color:#fff} #input-bar{background:' + c + '} #msg-input{background:rgba(255,255,255,0.25);border-color:rgba(255,255,255,0.4);color:#fff} #msg-input::placeholder{color:rgba(255,255,255,0.7)} #msg-input:focus{background:rgba(255,255,255,0.35);border-color:#fff} #send-btn{background:rgba(255,255,255,0.25);color:#fff;border:1.5px solid rgba(255,255,255,0.5)} #send-btn:active{filter:brightness(0.85)}';
    }
    applyUserColor();
    window.addEventListener('efm_color_ready', applyUserColor);

    function fmtTime(iso) {
      var d = new Date(iso);
      var h = d.getHours(), m = d.getMinutes();
      return (h % 12 || 12) + ':' + (m < 10 ? '0' : '') + m + ' ' + (h < 12 ? 'am' : 'pm');
    }

    function getTodayKey() {
      return 'efm_chat_' + new Date().toISOString().slice(0, 10);
    }

    function startEdit(row, bubble, msg, storeKey) {
      if (row.querySelector('.msg-edit-input')) return;
      var input = document.createElement('input');
      input.type = 'text';
      input.className = 'msg-edit-input';
      input.value = msg.text;
      input.style.cssText = 'width:100%;padding:9px 13px;border-radius:16px;border-bottom-right-radius:4px;border:none;outline:2px solid rgba(255,255,255,0.6);font-size:0.92rem;font-family:system-ui,sans-serif;box-sizing:border-box;background:' + bubble.style.background + ';color:' + bubble.style.color + ';';
      bubble.style.display = 'none';
      bubble.parentNode.insertBefore(input, bubble);
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);
      function save() {
        var newText = input.value.trim();
        if (newText) {
          msg.text = newText;
          bubble.textContent = newText;
          var stored = JSON.parse(localStorage.getItem(storeKey) || '[]');
          for (var i = 0; i < stored.length; i++) {
            if (stored[i].time === msg.time) { stored[i].text = newText; break; }
          }
          localStorage.setItem(storeKey, JSON.stringify(stored));
        }
        bubble.style.display = '';
        input.remove();
      }
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); save(); }
        if (e.key === 'Escape') { bubble.style.display = ''; input.remove(); }
      });
      input.addEventListener('blur', save);
    }

    function deleteMsg(row, msg, storeKey) {
      var stored = JSON.parse(localStorage.getItem(storeKey) || '[]');
      stored = stored.filter(function(m) { return m.time !== msg.time; });
      localStorage.setItem(storeKey, JSON.stringify(stored));
      row.remove();
    }

    function renderMessage(msg) {
      var empty = document.getElementById('empty-state');
      if (empty) empty.remove();
      var isOwn = msg.name === myName;
      var bgColor = isOwn
        ? (localStorage.getItem('efm_cursor_color') || '#2a7a2a')
        : getNameColor(msg.name);
      var row = document.createElement('div');
      row.className = 'msg-row ' + (isOwn ? 'own' : 'other');
      if (!isOwn) {
        var nameEl = document.createElement('div');
        nameEl.className = 'msg-name';
        nameEl.textContent = msg.name;
        nameEl.style.color = bgColor;
        row.appendChild(nameEl);
      }
      var bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = msg.text;
      bubble.style.background = bgColor;
      bubble.style.color = luminance(bgColor) > 0.55 ? '#111' : '#fff';
      if (isOwn) {
        var actions = document.createElement('div');
        actions.className = 'msg-actions';
        var editBtn = document.createElement('button');
        editBtn.className = 'msg-action-btn';
        editBtn.textContent = 'Edit';
        var delBtn = document.createElement('button');
        delBtn.className = 'msg-action-btn del';
        delBtn.textContent = 'Delete';
        (function(r, b, m) {
          editBtn.addEventListener('click', function(e) { e.stopPropagation(); startEdit(r, b, m, getTodayKey()); });
          delBtn.addEventListener('click', function(e) { e.stopPropagation(); deleteMsg(r, m, getTodayKey()); });
        })(row, bubble, msg);
        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        row.appendChild(actions);
      }
      row.appendChild(bubble);
      var time = document.createElement('div');
      time.className = 'msg-time';
      time.textContent = fmtTime(msg.time);
      row.appendChild(time);
      document.getElementById('msgs').appendChild(row);
      row.scrollIntoView({ block: 'end' });
    }

    var RAILWAY_URL = 'acceptable-adaptation-production-565f.up.railway.app';
    var CHAT_WS = window.location.hostname === 'localhost'
      ? 'ws://localhost:8080'
      : 'wss://' + RAILWAY_URL;

    function connectChat() {
      try { chatWs = new WebSocket(CHAT_WS); } catch(e) { return; }
      chatWs.onopen = function() {
        myName = localStorage.getItem('efm_cursor_name') || 'Guest';
        chatWs.send(JSON.stringify({ type: 'chat_join', name: myName }));
      };
      chatWs.onmessage = function(e) {
        var data = JSON.parse(e.data);
        if (data.type === 'chat_history') {
          var TODAY = new Date().toISOString().slice(0, 10);
          var local = JSON.parse(localStorage.getItem('efm_chat_' + TODAY) || '[]');
          var map = {};
          data.messages.forEach(function(m) { map[m.time] = m; });
          local.forEach(function(m) { map[m.time] = m; }); // local wins (preserves edits)
          var merged = Object.keys(map).sort().map(function(t) { return map[t]; });
          var msgsEl = document.getElementById('msgs');
          msgsEl.innerHTML = '<div id="empty-state"><div class="big">💬</div><div>No messages yet today.</div><div>Say something!</div></div>';
          merged.forEach(renderMessage);
        } else if (data.type === 'chat') {
          renderMessage(data);
        } else if (data.type === 'claude_reply') {
          var t = document.getElementById('claude-thinking');
          if (t) t.remove();
          renderClaudeMessage(data.text);
          claudeThinking = false;
        }
      };
      chatWs.onclose = function() { setTimeout(connectChat, 3000); };
    }

    var claudeMode = false;
    var claudeThinking = false;

    function renderClaudeMessage(text) {
      var empty = document.getElementById('empty-state');
      if (empty) empty.remove();
      var row = document.createElement('div');
      row.className = 'msg-row other';
      var nameEl = document.createElement('div');
      nameEl.className = 'msg-name';
      nameEl.style.color = '#e07040';
      nameEl.textContent = '✦ Claude';
      var bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.style.background = '#fff3ee';
      bubble.style.color = '#2a1a10';
      bubble.style.border = '1.5px solid #e8c4a8';
      bubble.textContent = text;
      var time = document.createElement('div');
      time.className = 'msg-time';
      time.textContent = fmtTime(new Date().toISOString());
      row.appendChild(nameEl);
      row.appendChild(bubble);
      row.appendChild(time);
      document.getElementById('msgs').appendChild(row);
      row.scrollIntoView({ block: 'end' });
    }

    function renderThinking() {
      var empty = document.getElementById('empty-state');
      if (empty) empty.remove();
      var row = document.createElement('div');
      row.id = 'claude-thinking';
      row.className = 'msg-row other';
      var nameEl = document.createElement('div');
      nameEl.className = 'msg-name';
      nameEl.style.color = '#e07040';
      nameEl.textContent = '✦ Claude';
      var bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.style.background = '#fff3ee';
      bubble.style.color = '#aaa';
      bubble.style.border = '1.5px solid #e8c4a8';
      bubble.textContent = '…';
      row.appendChild(nameEl);
      row.appendChild(bubble);
      document.getElementById('msgs').appendChild(row);
      row.scrollIntoView({ block: 'end' });
    }

    function toggleClaudeMode(e) {
      e.preventDefault();
      claudeMode = !claudeMode;
      var btn = document.getElementById('claude-btn');
      var input = document.getElementById('msg-input');
      if (claudeMode) {
        btn.style.background = 'rgba(224,112,64,0.35)';
        input.placeholder = 'Ask Claude…';
        renderClaudeMessage("Hi! I'm Claude — I helped build this EFM math site. Ask me anything about math or the website!");
      } else {
        btn.style.background = '';
        input.placeholder = 'Type a message…';
      }
      input.focus();
    }

    function sendMessage() {
      var input = document.getElementById('msg-input');
      var text = input.value.trim();
      if (!text) return;
      myName = localStorage.getItem('efm_cursor_name') || 'Guest';

      if (claudeMode) {
        if (claudeThinking) return;
        var userMsg = { name: myName, text: text, time: new Date().toISOString() };
        renderMessage(userMsg);
        input.value = '';
        claudeThinking = true;
        var thinking = document.getElementById('claude-thinking');
        if (thinking) thinking.remove();
        renderThinking();
        if (chatWs && chatWs.readyState === 1) {
          chatWs.send(JSON.stringify({ type: 'ask_claude', text: text }));
        } else {
          document.getElementById('claude-thinking').remove();
          renderClaudeMessage("I'm not connected right now. Try again in a moment!");
          claudeThinking = false;
        }
        input.focus();
        return;
      }

      var TODAY = new Date().toISOString().slice(0, 10);
      var STORE_KEY = 'efm_chat_' + TODAY;
      var msg = { name: myName, text: text, time: new Date().toISOString() };
      var stored = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
      stored.push(msg);
      localStorage.setItem(STORE_KEY, JSON.stringify(stored));
      if (chatWs && chatWs.readyState === 1) {
        chatWs.send(JSON.stringify({ type: 'chat', name: msg.name, text: msg.text, time: msg.time }));
      } else {
        renderMessage(msg);
      }
      input.value = '';
      input.focus();
    }

    document.getElementById('msg-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendMessage();
    });

    connectChat();
  </script>

<script src="cursors.js"></script>
  </div><!-- #chat-main -->
</body>
</html>
