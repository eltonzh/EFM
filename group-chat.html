<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png" id="favicon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EFM Group Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f13;
      height: 100dvh;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: row;
    }
    #side-bar {
      width: 56px;
      background: #1a1a20;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 0;
      gap: 18px;
      flex-shrink: 0;
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    #side-bar img { width: 32px; opacity: 0.9; }
    #side-bar a {
      color: #fff;
      font-size: 1.1rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 10px;
      transition: background 0.12s;
    }
    #side-bar a:hover { background: rgba(255,255,255,0.12); }
    #side-bar a.active { background: rgba(42,122,42,0.35); }
    #chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    #chat-header {
      background: #0f0f13;
      border-top: 12px solid #0f0f13;
      padding: 14px 18px 14px calc(18px + 0.5cm);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    @media (min-width: 600px) {
      #chat-header {
        padding-top: 0;
        padding-left: 0.5cm;
        align-items: flex-start;
      }
      #chat-header .back,
      #chat-header .dot,
      #chat-header .title {
        margin-top: 0;
        padding-top: 0;
      }
    }
    #chat-header .back {
      color: rgba(255,255,255,0.6);
      font-size: 0.85rem;
      text-decoration: none;
      margin-right: 4px;
    }
    #chat-header .back:hover { color: #fff; }
    #chat-header .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #2a7a2a;
      flex-shrink: 0;
    }
    #chat-header .title {
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }
    #info-bar {
      background: #c8e6c8;
      border-bottom: 1px solid #a8cca8;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #info-bar span {
      font-size: 0.78rem;
      color: #1e4a1e;
      flex: 1;
    }
    #history-btn {
      white-space: nowrap;
      font-size: 0.78rem;
      font-weight: 600;
      font-family: system-ui, sans-serif;
      background: #2a7a2a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 5px 12px;
      cursor: pointer;
      flex-shrink: 0;
    }
    #history-btn:active { background: #1e5a1e; }
    #msgs {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fff;
    }
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #2a5a2a;
      font-size: 0.9rem;
      opacity: 0.6;
      text-align: center;
      gap: 8px;
      padding: 32px;
    }
    #empty-state .big { font-size: 2rem; }
    .msg-row { display: flex; flex-direction: column; max-width: 80%; }
    .msg-row.own { align-self: flex-end; align-items: flex-end; }
    .msg-row.other { align-self: flex-start; align-items: flex-start; }
    .msg-name {
      font-size: 0.72rem;
      color: #2a5a2a;
      margin-bottom: 3px;
      padding: 0 4px;
    }
    .msg-bubble {
      padding: 9px 13px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.45;
      word-break: break-word;
    }
    .msg-row.own .msg-bubble {
      background: #2a7a2a;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-row.other .msg-bubble {
      background: rgba(255,255,255,0.75);
      color: #0f0f13;
      border-bottom-left-radius: 4px;
    }
    .msg-time {
      font-size: 0.68rem;
      color: rgba(0,0,0,0.35);
      margin-top: 3px;
      padding: 0 4px;
    }
    .msg-actions {
      display: flex; gap: 4px; margin-bottom: 3px; align-self: flex-end;
      opacity: 0; pointer-events: none; transition: opacity 0.12s;
    }
    .msg-row.own:hover .msg-actions { opacity: 1; pointer-events: auto; }
    .msg-action-btn {
      font-size: 0.68rem; font-weight: 600; padding: 2px 9px;
      border: none; border-radius: 6px; cursor: pointer;
      font-family: system-ui, sans-serif; background: rgba(0,0,0,0.1); color: #444;
    }
    .msg-action-btn.del { color: #c0392b; }
    .msg-action-btn:hover { background: rgba(0,0,0,0.18); }
    #input-bar {
      background: #fff;
      border-top: 1px solid rgba(0,0,0,0.08);
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1;
      border: 1.5px solid rgba(0,0,0,0.12);
      border-radius: 99px;
      padding: 9px 15px;
      font-size: 0.9rem;
      font-family: system-ui, sans-serif;
      outline: none;
      background: #f7f7f7;
    }
    #msg-input:focus { border-color: #2a7a2a; background: #fff; }
    #send-btn {
      background: #2a7a2a;
      color: #fff;
      border: none;
      border-radius: 99px;
      padding: 9px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: system-ui, sans-serif;
      cursor: pointer;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    #send-btn:active { background: #1e5a1e; }
    #claude-panel {
      display: none;
      position: fixed;
      bottom: 80px;
      left: 68px;
      width: 320px;
      height: 500px;
      background: #1a1a20;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      z-index: 9999;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #claude-panel.open { display: flex; }
    #claude-panel-header {
      padding: 12px 14px;
      background: #e07040;
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #claude-panel-header span { flex: 1; }
    #claude-panel-close {
      background: none; border: none; color: #fff;
      font-size: 1.1rem; cursor: pointer; padding: 0 4px; line-height: 1;
    }
    #claude-msgs {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
      background: #0f0f13;
    }
    .claude-bubble {
      padding: 8px 12px; border-radius: 12px;
      font-size: 0.88rem; line-height: 1.45; max-width: 90%;
    }
    .claude-bubble.user { background: var(--sfv, #2a7a2a); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .claude-bubble.ai { background: #fff3ee; color: #2a1a10; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e8c4a8; }
    .claude-bubble.thinking { color: #888; font-style: italic; }
    #claude-input-row {
      display: flex; gap: 6px; padding: 8px 10px;
      background: #1a1a20; border-top: 1px solid rgba(255,255,255,0.08);
    }
    #claude-input {
      flex: 1; border: 1px solid rgba(255,255,255,0.15); border-radius: 99px;
      padding: 7px 12px; font-size: 0.85rem; font-family: system-ui,sans-serif;
      outline: none; background: #0f0f13; color: #fff;
    }
    #claude-input::placeholder { color: #666; }
    #claude-send {
      background: #e07040; color: #fff; border: none; border-radius: 99px;
      padding: 7px 14px; font-size: 0.85rem; font-weight: 600;
      font-family: system-ui,sans-serif; cursor: pointer;
    }
    #chatgpt-panel {
      display: none;
      position: fixed;
      bottom: 80px;
      left: 68px;
      width: 320px;
      height: 500px;
      background: #1a1a20;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      z-index: 9999;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #chatgpt-panel.open { display: flex; }
    #chatgpt-panel-header {
      padding: 12px 14px;
      background: #10A37F;
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #chatgpt-panel-header span { flex: 1; }
    #gpt-msgs {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
      background: #0f0f13;
    }
    .gpt-bubble {
      padding: 8px 12px; border-radius: 12px;
      font-size: 0.88rem; line-height: 1.45; max-width: 90%;
    }
    .gpt-bubble.user { background: #10A37F; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .gpt-bubble.ai { background: #f0fff8; color: #0a2a1f; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #a8e0c8; }
    .gpt-bubble.thinking { color: #888; font-style: italic; }
    #gpt-input-row {
      display: flex; gap: 6px; padding: 8px 10px;
      background: #1a1a20; border-top: 1px solid rgba(255,255,255,0.08);
    }
    #gpt-input {
      flex: 1; border: 1px solid rgba(255,255,255,0.15); border-radius: 99px;
      padding: 7px 12px; font-size: 0.85rem; font-family: system-ui,sans-serif;
      outline: none; background: #0f0f13; color: #fff;
    }
    #gpt-input::placeholder { color: #666; }
    #gpt-send {
      background: #10A37F; color: #fff; border: none; border-radius: 99px;
      padding: 7px 14px; font-size: 0.85rem; font-weight: 600;
      font-family: system-ui,sans-serif; cursor: pointer;
    }
  </style>
</head>

  <script>
    var myName = sessionStorage.getItem('efm_display_name') || localStorage.getItem('efm_cursor_name') || 'Guest';
    var chatWs;

    // All the named colors the user wants for other people's bubbles
    var CHAT_COLORS = [
      '#DC143C','#FF2400','#9B111E','#800020','#800000',
      '#FF007F','#FF6B6B','#FA8072','#FF00FF','#DD77FF',
      '#FFBF00','#F4C430','#F28500','#FFCBA4','#FBCEB1',
      '#FFD700','#FFDB58','#FFFF99','#FFF44F','#FFFDD0',
      '#50C878','#808000','#BCB88A','#98FF98','#00A86B',
      '#32CD32','#228B22','#008080','#7FFF00','#AACC00',
      '#0F52BA','#4B0082','#0047AB','#001F5B','#007BA7',
      '#40E0D0','#967BB6','#C8A2C8','#9966CC','#DDA0DD',
      '#483C32','#704214','#A0522D','#CC7722','#36454F',
      '#708090','#FFFFF0','#F5F5DC','#555D50','#F2F0E6'
    ];
    var nameColorMap = {};
    var chatColorIdx = 0;

    function getNameColor(name) {
      if (!nameColorMap[name]) {
        nameColorMap[name] = CHAT_COLORS[chatColorIdx % CHAT_COLORS.length];
        chatColorIdx++;
      }
      return nameColorMap[name];
    }

    function luminance(hex) {
      if (!hex || hex[0] !== '#' || hex.length < 7) return 0.5;
      var r = parseInt(hex.slice(1,3),16)/255;
      var g = parseInt(hex.slice(3,5),16)/255;
      var b = parseInt(hex.slice(5,7),16)/255;
      return 0.299*r + 0.587*g + 0.114*b;
    }

    function applyUserColor() {
      var sfv = localStorage.getItem('efm_cursor_color2');
      if (sfv) document.documentElement.style.setProperty('--sfv', sfv);
      var c = localStorage.getItem('efm_cursor_color') || '#2a7a2a';
      myName = sessionStorage.getItem('efm_display_name') || localStorage.getItem('efm_cursor_name') || 'Guest';
      var el = document.getElementById('_efm_color');
      if (!el) { el = document.createElement('style'); el.id = '_efm_color'; document.head.appendChild(el); }
      el.textContent = '#info-bar{background:' + c + ';border-bottom-color:' + c + '} #info-bar span{color:#fff} #input-bar{background:' + c + '} #msg-input{background:rgba(255,255,255,0.25);border-color:rgba(255,255,255,0.4);color:#fff} #msg-input::placeholder{color:rgba(255,255,255,0.7)} #msg-input:focus{background:rgba(255,255,255,0.35);border-color:#fff} #send-btn{background:rgba(255,255,255,0.25);color:#fff;border:1.5px solid rgba(255,255,255,0.5)} #send-btn:active{filter:brightness(0.85)}';
    }
    applyUserColor();
    window.addEventListener('efm_color_ready', applyUserColor);

    function fmtTime(iso) {
      var d = new Date(iso);
      var h = d.getHours(), m = d.getMinutes();
      return (h % 12 || 12) + ':' + (m < 10 ? '0' : '') + m + ' ' + (h < 12 ? 'am' : 'pm');
    }

    function getTodayKey() {
      return 'efm_chat_' + new Date().toISOString().slice(0, 10);
    }

    function startEdit(row, bubble, msg, storeKey) {
      if (row.querySelector('.msg-edit-input')) return;
      var input = document.createElement('input');
      input.type = 'text';
      input.className = 'msg-edit-input';
      input.value = msg.text;
      input.style.cssText = 'width:100%;padding:9px 13px;border-radius:16px;border-bottom-right-radius:4px;border:none;outline:2px solid rgba(255,255,255,0.6);font-size:0.92rem;font-family:system-ui,sans-serif;box-sizing:border-box;background:' + bubble.style.background + ';color:' + bubble.style.color + ';';
      bubble.style.display = 'none';
      bubble.parentNode.insertBefore(input, bubble);
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);
      function save() {
        var newText = input.value.trim();
        if (newText) {
          msg.text = newText;
          bubble.textContent = newText;
          var stored = JSON.parse(localStorage.getItem(storeKey) || '[]');
          for (var i = 0; i < stored.length; i++) {
            if (stored[i].time === msg.time) { stored[i].text = newText; break; }
          }
          localStorage.setItem(storeKey, JSON.stringify(stored));
        }
        bubble.style.display = '';
        input.remove();
      }
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); save(); }
        if (e.key === 'Escape') { bubble.style.display = ''; input.remove(); }
      });
      input.addEventListener('blur', save);
    }

    function deleteMsg(row, msg, storeKey) {
      var stored = JSON.parse(localStorage.getItem(storeKey) || '[]');
      stored = stored.filter(function(m) { return m.time !== msg.time; });
      localStorage.setItem(storeKey, JSON.stringify(stored));
      row.remove();
    }

    function renderMessage(msg) {
      var empty = document.getElementById('empty-state');
      if (empty) empty.remove();
      var isOwn = msg.name === myName;
      var bgColor = isOwn
        ? (localStorage.getItem('efm_cursor_color') || '#2a7a2a')
        : getNameColor(msg.name);
      var row = document.createElement('div');
      row.className = 'msg-row ' + (isOwn ? 'own' : 'other');
      if (!isOwn) {
        var nameEl = document.createElement('div');
        nameEl.className = 'msg-name';
        nameEl.textContent = msg.name;
        nameEl.style.color = bgColor;
        row.appendChild(nameEl);
      }
      var bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = msg.text;
      bubble.style.background = bgColor;
      bubble.style.color = luminance(bgColor) > 0.55 ? '#111' : '#fff';
      if (isOwn) {
        var actions = document.createElement('div');
        actions.className = 'msg-actions';
        var editBtn = document.createElement('button');
        editBtn.className = 'msg-action-btn';
        editBtn.textContent = 'Edit';
        var delBtn = document.createElement('button');
        delBtn.className = 'msg-action-btn del';
        delBtn.textContent = 'Delete';
        (function(r, b, m) {
          editBtn.addEventListener('click', function(e) { e.stopPropagation(); startEdit(r, b, m, getTodayKey()); });
          delBtn.addEventListener('click', function(e) { e.stopPropagation(); deleteMsg(r, m, getTodayKey()); });
        })(row, bubble, msg);
        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        row.appendChild(actions);
      }
      row.appendChild(bubble);
      var time = document.createElement('div');
      time.className = 'msg-time';
      time.textContent = fmtTime(msg.time);
      row.appendChild(time);
      document.getElementById('msgs').appendChild(row);
      row.scrollIntoView({ block: 'end' });
    }

    var RAILWAY_URL = 'acceptable-adaptation-production-565f.up.railway.app';
    var CHAT_WS = window.location.hostname === 'localhost'
      ? 'ws://localhost:8080'
      : 'wss://' + RAILWAY_URL;

    function connectChat() {
      try { chatWs = new WebSocket(CHAT_WS); } catch(e) { return; }
      chatWs.onopen = function() {
        myName = sessionStorage.getItem('efm_display_name') || localStorage.getItem('efm_cursor_name') || 'Guest';
        chatWs.send(JSON.stringify({ type: 'chat_join', name: myName }));
      };
      chatWs.onmessage = function(e) {
        var data = JSON.parse(e.data);
        if (data.type === 'chat_history') {
          var TODAY = new Date().toISOString().slice(0, 10);
          var local = JSON.parse(localStorage.getItem('efm_chat_' + TODAY) || '[]');
          var map = {};
          data.messages.forEach(function(m) { map[m.time] = m; });
          local.forEach(function(m) { map[m.time] = m; }); // local wins (preserves edits)
          var merged = Object.keys(map).sort().map(function(t) { return map[t]; });
          var msgsEl = document.getElementById('msgs');
          msgsEl.innerHTML = '<div id="empty-state"><div class="big">💬</div><div>No messages yet today.</div><div>Say something!</div></div>';
          merged.forEach(renderMessage);
        } else if (data.type === 'chat') {
          renderMessage(data);
        } else if (data.type === 'claude_reply') {
          var thinking = document.querySelector('#claude-msgs .thinking');
          if (thinking) thinking.remove();
          addClaudeBubble(data.text, 'ai');
          claudeThinking = false;
        } else if (data.type === 'gpt_reply') {
          var thinking = document.querySelector('#gpt-msgs .thinking');
          if (thinking) thinking.remove();
          addGPTBubble(data.text, 'ai');
          gptThinking = false;
        }
      };
      chatWs.onclose = function() { setTimeout(connectChat, 3000); };
    }

    var claudeThinking = false;

    function toggleClaudePanel(e) {
      e.preventDefault();
      var claude = document.getElementById('claude-panel');
      var gpt    = document.getElementById('chatgpt-panel');
      if (claude.classList.contains('open')) {
        claude.classList.remove('open');
        document.getElementById('claude-btn').style.background = '';
        if (gpt.classList.contains('open')) gpt.style.left = '68px';
      } else {
        claude.style.left = gpt.classList.contains('open') ? '400px' : '68px';
        claude.classList.add('open');
        document.getElementById('claude-btn').style.background = 'rgba(224,112,64,0.35)';
        if (!document.getElementById('claude-msgs').firstChild) {
          if (!restoreClaudeHistory()) {
            addClaudeBubble("Hi! I'm Claude — I helped build this EFM math site. Ask me anything about math or the website!", 'ai');
          }
        }
        document.getElementById('claude-input').focus();
      }
    }

    function saveClaudeHistory() {
      var bubbles = document.querySelectorAll('#claude-msgs .claude-bubble:not(.thinking)');
      var history = Array.from(bubbles).map(function(b) {
        return { text: b.textContent, who: b.classList.contains('user') ? 'user' : 'ai' };
      });
      localStorage.setItem('efm_claude_history', JSON.stringify(history));
    }

    function restoreClaudeHistory() {
      var saved = localStorage.getItem('efm_claude_history');
      if (!saved) return false;
      var history = JSON.parse(saved);
      history.forEach(function(m) { addClaudeBubble(m.text, m.who); });
      return history.length > 0;
    }

    function addClaudeBubble(text, who) {
      var msgs = document.getElementById('claude-msgs');
      var b = document.createElement('div');
      b.className = 'claude-bubble ' + who;
      b.textContent = text;
      msgs.appendChild(b);
      msgs.scrollTop = msgs.scrollHeight;
      if (who !== 'thinking') saveClaudeHistory();
      return b;
    }

    function sendToClaude() {
      var input = document.getElementById('claude-input');
      var text = input.value.trim();
      if (!text || claudeThinking) return;
      input.value = '';
      addClaudeBubble(text, 'user');
      claudeThinking = true;
      var thinking = addClaudeBubble('…', 'ai thinking');
      if (chatWs && chatWs.readyState === 1) {
        var history = JSON.parse(localStorage.getItem('efm_claude_history') || '[]');
        chatWs.send(JSON.stringify({ type: 'ask_claude', text: text, history: history }));
      } else {
        thinking.remove();
        addClaudeBubble("I'm not connected right now. Try again in a moment!", 'ai');
        claudeThinking = false;
      }
    }

    document.getElementById('claude-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendToClaude();
    });

    var gptThinking = false;

    function toggleGPTPanel(e) {
      e.preventDefault();
      var claude = document.getElementById('claude-panel');
      var gpt    = document.getElementById('chatgpt-panel');
      if (gpt.classList.contains('open')) {
        gpt.classList.remove('open');
        document.getElementById('chatgpt-btn').style.background = '';
        if (claude.classList.contains('open')) claude.style.left = '68px';
      } else {
        gpt.style.left = claude.classList.contains('open') ? '400px' : '68px';
        gpt.classList.add('open');
        document.getElementById('chatgpt-btn').style.background = 'rgba(16,163,127,0.35)';
        if (!document.getElementById('gpt-msgs').firstChild) {
          if (!restoreGPTHistory()) {
            addGPTBubble("Hi! I'm ChatGPT. Ask me anything about math or anything else!", 'ai');
          }
        }
        document.getElementById('gpt-input').focus();
      }
    }

    function saveGPTHistory() {
      var bubbles = document.querySelectorAll('#gpt-msgs .gpt-bubble:not(.thinking)');
      var history = Array.from(bubbles).map(function(b) {
        return { text: b.textContent, who: b.classList.contains('user') ? 'user' : 'ai' };
      });
      localStorage.setItem('efm_gpt_history', JSON.stringify(history));
    }

    function restoreGPTHistory() {
      var saved = localStorage.getItem('efm_gpt_history');
      if (!saved) return false;
      var history = JSON.parse(saved);
      history.forEach(function(m) { addGPTBubble(m.text, m.who); });
      return history.length > 0;
    }

    function addGPTBubble(text, who) {
      var msgs = document.getElementById('gpt-msgs');
      var b = document.createElement('div');
      b.className = 'gpt-bubble ' + who;
      b.textContent = text;
      msgs.appendChild(b);
      msgs.scrollTop = msgs.scrollHeight;
      if (who !== 'thinking') saveGPTHistory();
      return b;
    }

    function sendToGPT() {
      var input = document.getElementById('gpt-input');
      var text = input.value.trim();
      if (!text || gptThinking) return;
      input.value = '';
      addGPTBubble(text, 'user');
      gptThinking = true;
      var thinking = addGPTBubble('…', 'ai thinking');
      if (chatWs && chatWs.readyState === 1) {
        var history = JSON.parse(localStorage.getItem('efm_gpt_history') || '[]');
        chatWs.send(JSON.stringify({ type: 'ask_chatgpt', text: text, history: history }));
      } else {
        thinking.remove();
        addGPTBubble("I'm not connected right now. Try again in a moment!", 'ai');
        gptThinking = false;
      }
    }

    document.getElementById('gpt-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendToGPT();
    });

    function sendMessage() {
      var input = document.getElementById('msg-input');
      var text = input.value.trim();
      if (!text) return;
      myName = sessionStorage.getItem('efm_display_name') || localStorage.getItem('efm_cursor_name') || 'Guest';

      var TODAY = new Date().toISOString().slice(0, 10);
      var STORE_KEY = 'efm_chat_' + TODAY;
      var msg = { name: myName, text: text, time: new Date().toISOString() };
      var stored = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
      stored.push(msg);
      localStorage.setItem(STORE_KEY, JSON.stringify(stored));
      if (chatWs && chatWs.readyState === 1) {
        chatWs.send(JSON.stringify({ type: 'chat', name: msg.name, text: msg.text, time: msg.time }));
      } else {
        renderMessage(msg);
      }
      input.value = '';
      input.focus();
    }

    document.getElementById('msg-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendMessage();
    });

    connectChat();

    if (window.location.hash === '#claude') {
      history.replaceState(null, '', window.location.pathname);
      var claude = document.getElementById('claude-panel');
      var gpt    = document.getElementById('chatgpt-panel');
      claude.style.left = gpt.classList.contains('open') ? '400px' : '68px';
      claude.classList.add('open');
      document.getElementById('claude-btn').style.background = 'rgba(224,112,64,0.35)';
      if (!document.getElementById('claude-msgs').firstChild) {
        if (!restoreClaudeHistory()) {
          addClaudeBubble("Hi! I'm Claude — I helped build this EFM math site. Ask me anything about math or the website!", 'ai');
        }
      }
    }
  </script>

<script src="cursors.js"></script>
  </div><!-- #chat-main -->
</body>
</html>
